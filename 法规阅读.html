<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4 部法规原文 — 两员考证</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #fafaf9; --panel: #fff; --text: #292524; --muted: #78716c;
  --border: #e7e5e4; --accent: #d97706; --highlight: #fef3c7;
  --shadow: 0 1px 3px rgba(0,0,0,0.05);
  --shadow-lg: 0 10px 25px rgba(0,0,0,0.08);
}
body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Serif SC", Georgia, serif;
  background: var(--bg); color: var(--text); line-height: 1.85;
  -webkit-font-smoothing: antialiased;
}
.container { max-width: 1500px; margin: 0 auto; padding: 16px; }

/* Header */
.header {
  background: linear-gradient(135deg, #92400e 0%, #b45309 100%);
  color: white; border-radius: 14px;
  padding: 24px 28px; margin-bottom: 16px;
  box-shadow: var(--shadow-lg);
}
.header h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
.header .sub { opacity: 0.85; font-size: 13px; }
.back-link { display: inline-block; margin-top: 10px; color: white; opacity: 0.9; text-decoration: none; font-size: 13px; border: 1px solid rgba(255,255,255,0.3); padding: 4px 10px; border-radius: 6px; }
.back-link:hover { opacity: 1; background: rgba(255,255,255,0.1); }

/* Tabs */
.tabs {
  display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap;
}
.tab {
  flex: 1; min-width: 200px;
  background: var(--panel); border: 2px solid var(--border);
  border-radius: 12px; padding: 14px 18px;
  cursor: pointer; transition: all 0.15s;
}
.tab:hover { border-color: var(--accent); }
.tab.active { border-color: var(--accent); background: #fffbeb; box-shadow: var(--shadow); }
.tab-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
.tab-meta { font-size: 12px; color: var(--muted); }
.tab-badge { display: inline-block; font-size: 10px; padding: 1px 6px; background: var(--accent); color: white; border-radius: 4px; margin-right: 6px; }

/* Toolbar */
.toolbar {
  background: var(--panel); border-radius: 10px; padding: 12px 16px;
  margin-bottom: 16px; box-shadow: var(--shadow);
  display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
}
.search {
  flex: 1; min-width: 200px; padding: 8px 12px;
  border: 1px solid var(--border); border-radius: 6px;
  font-size: 14px; outline: none;
}
.search:focus { border-color: var(--accent); }
.size-btn {
  padding: 6px 12px; border: 1px solid var(--border);
  background: white; border-radius: 6px; cursor: pointer; font-size: 13px;
}
.size-btn:hover { background: #f5f5f4; }
.font-size-1 .article { font-size: 14px; }
.font-size-2 .article { font-size: 15px; }
.font-size-3 .article { font-size: 17px; line-height: 2; }

/* Main */
.main { display: grid; grid-template-columns: 280px 1fr; gap: 16px; }
@media (max-width: 900px) { .main { grid-template-columns: 1fr; } }

/* TOC */
.toc {
  background: var(--panel); border-radius: 10px; padding: 14px 16px;
  box-shadow: var(--shadow); position: sticky; top: 16px;
  max-height: calc(100vh - 32px); overflow-y: auto;
}
.toc h3 { font-size: 12px; color: var(--muted); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.6px; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
.toc-chapter {
  display: block; padding: 6px 10px; font-size: 13px;
  border-radius: 5px; cursor: pointer; color: var(--text);
  border-left: 2px solid transparent;
  transition: all 0.1s;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}
.toc-chapter:hover { background: #fef3c7; }
.toc-chapter.active { background: #fef3c7; border-left-color: var(--accent); color: var(--accent); font-weight: 500; }

/* Content */
.content {
  background: var(--panel); border-radius: 10px;
  padding: 28px 36px; box-shadow: var(--shadow);
  min-width: 0;
}
.reg-meta {
  background: #fafaf9; border-left: 3px solid var(--accent);
  padding: 12px 16px; border-radius: 0 8px 8px 0;
  font-size: 13px; color: var(--muted); margin-bottom: 24px;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}
.reg-meta a { color: var(--accent); }
.chapter-block { margin-bottom: 32px; scroll-margin-top: 16px; }
.chapter-title {
  font-size: 18px; font-weight: 700;
  border-bottom: 2px solid var(--accent);
  padding-bottom: 8px; margin-bottom: 16px;
  color: var(--accent);
  font-family: "Noto Serif SC", "Source Han Serif SC", "PingFang SC", serif;
}
.article {
  margin-bottom: 14px; padding: 8px 0;
  font-size: 15px; line-height: 1.95;
  position: relative;
}
.article-num {
  font-weight: 700; color: var(--accent);
  font-family: "Noto Serif SC", "Source Han Serif SC", "PingFang SC", serif;
  margin-right: 6px;
}
mark { background: var(--highlight); padding: 1px 2px; border-radius: 2px; }
.search-hit { animation: pulse 0.8s ease; }
@keyframes pulse {
  0%, 100% { background: var(--panel); }
  50% { background: var(--highlight); }
}

/* Note button */
.note-btn {
  position: absolute; right: -4px; top: 6px;
  width: 22px; height: 22px; border-radius: 50%;
  border: 1px solid var(--border); background: white;
  cursor: pointer; font-size: 11px;
  display: flex; align-items: center; justify-content: center;
  color: var(--muted); transition: all 0.15s;
}
.note-btn:hover { border-color: var(--accent); color: var(--accent); }
.note-btn.has-note { background: var(--accent); color: white; border-color: var(--accent); }
.article-note {
  display: none; margin-top: 8px; padding: 10px 12px;
  background: #fffbeb; border-left: 3px solid var(--accent);
  border-radius: 0 6px 6px 0;
  font-size: 13px; font-family: -apple-system, sans-serif;
}
.article-note.show { display: block; }
.article-note textarea {
  width: 100%; min-height: 60px; padding: 6px; border: 1px solid var(--border);
  border-radius: 4px; font-family: inherit; font-size: 13px; resize: vertical;
  outline: none;
}
.article-note textarea:focus { border-color: var(--accent); }
</style>
</head>

<script>
const DATA = [{"id": "reg1", "title": "船舶载运危险货物安全监督管理规定", "issuer": "交通运输部令 2024 年第 14 号", "effective": "2025-03-01", "source": "https://xxgk.mot.gov.cn/2020/gz/202501/t20250120_4162823.html", "chapter_count": 7, "article_count": 51, "chapters": [{"title": "第一章 总   则", "articles": ["**第一条** 为加强船舶载运危险货物监督管理，保障水上人命、财产安全，防治船舶污染环境，依据《中华人民共和国海上交通安全法》《中华人民共和国港口法》《中华人民共和国内河交通安全管理条例》等法律、行政法规，制定本规定。", "**第二条** 船舶在中华人民共和国管辖水域载运危险货物的活动，适用本规定。", "**第三条** 交通运输部主管全国船舶载运危险货物的安全管理工作。\n交通运输部海事局负责全国船舶载运危险货物的安全监督管理工作。\n各级海事管理机构按照职责权限具体负责船舶载运危险货物的安全监督管理工作。"]}, {"title": "第二章 船舶和人员管理", "articles": ["**第四条** 从事危险货物运输的船舶所有人、经营人或者管理人，应当按照交通运输部有关船舶安全营运和防污染管理体系的要求建立和实施相应的体系或者制度。\n从事危险货物运输的船舶经营人或者管理人，应当配备专职安全管理人员。", "**第五条** 载运危险货物的船舶应当编制安全和防污染应急预案，配备相应的应急救护、消防和人员防护等设备及器材。", "**第六条** 载运危险货物的船舶应当经依法设立的船舶检验机构检验合格，取得相应的检验证书和文书，并保持良好状态。\n载运危险货物的船舶，其船体、构造、设备、性能和布置等方面应当符合有关法律、行政法规、规章以及强制性标准和技术规范的要求；载运危险货物的国际航行船舶还应当符合有关国际公约的规定，具备相应的适航、适装条件。", "**第七条** 载运危险货物的船舶应当按照规定安装和使用船舶自动识别系统等船载设备。船舶经营人、管理人应当加强对船舶的动态管理。", "**第八条** 除法律、行政法规禁止内河运输的危险化学品外，船舶通过内河运输危险化学品的，应当遵守国务院交通运输主管部门关于危险化学品分类管理的要求。\n禁止托运人在普通货物中夹带危险货物，或者将危险货物谎报、匿报为普通货物托运。\n取得相应资质的客货船或者滚装客船载运危险货物时，不得载运旅客，但按照相关规定随车押运人员和滚装车辆的司机除外。其他客船禁止载运危险货物。", "**第九条** 船舶载运危险货物应当符合有关危险货物积载、隔离和运输的安全技术规范，并符合相应的适装证书的要求。船舶不得受载、承运不符合包装、积载和隔离安全技术规范的危险货物。\n船舶载运包装危险货物，还应当符合《国际海运危险货物规则》的要求；船舶载运B组固体散装货物，还应当符合《国际海运固体散装货物规则》的要求。", "**第十条** 从事危险货物运输船舶的船员，应当按照规定持有特殊培训合格证，熟悉所在船舶载运危险货物安全知识和操作规程，了解所运危险货物的性质和安全预防及应急处置措施。", "**第十一条** 按照本规定办理危险货物申报或者报告手续的人员和集装箱装箱现场检查的人员，应当熟悉相关法规、技术规范和申报程序。\n海事管理机构对危险货物申报或者报告人员以及集装箱装箱现场检查员日常从业情况实施监督抽查，并实行诚信管理制度。", "**第十二条** 海事管理机构依据职责和交通运输部的有关规定，在船舶现场监督检查法定证书文书时，发现从事水路运输的船舶不能提供有效的船舶营运证件的，应当通知有关主管部门依法处理。"]}, {"title": "第三章 包装和集装箱管理", "articles": ["**第十三条** 拟交付船舶载运的危险货物包装，其性能应当符合相关法规、技术规范以及国际公约规定，并依法取得相应的检验合格证明。", "**第十四条** 拟交付船舶载运的危险货物使用新型或者改进的包装类型，应当符合《国际海运危险货物规则》有关等效包装的规定，并向海事管理机构提交该包装的性能检验报告、检验证书或者文书等资料。", "**第十五条** 载运危险货物的船运集装箱及载运危险化学品的船舶配载的容器应当按照有关法律、行政法规的规定，经依法设立的船舶检验机构检验合格，方可用于船舶运输。", "**第十六条** 拟交付船舶载运的危险货物包件、中型散装容器、大宗包装、货物运输组件，应当按照规定显示所装危险货物特性的标志、标记和标牌。", "**第十七条** 拟载运危险货物的船运集装箱应当无损坏，箱内应当清洁、干燥、无污损，满足所装载货物要求。处于熏蒸状态下的船运集装箱等货物运输组件，应当符合相关积载要求，并显示熏蒸警告标牌。", "**第十八条** 装入船运集装箱的危险货物及其包装应当保持完好，无破损、撒漏或者渗漏，并按照规定进行衬垫和加固，其积载、隔离应当符合相关安全要求。性质不相容的危险货物不得同箱装运。", "**第十九条** 集装箱装箱现场检查员应当对船舶载运危险货物集装箱的装箱活动进行现场检查，在装箱完毕后，对符合《海运危险货物集装箱装箱安全技术要求》（GB 40163）的签署《集装箱装箱证明书》。", "**第二十条** 曾载运过危险货物的空包装或者空容器，未经清洁或者采取其他措施消除危险性的，应当视作盛装危险货物的包装或者容器。"]}, {"title": "第四章 申报和报告管理", "articles": ["**第二十一条** 船舶载运危险货物进出港口，应当符合下列条件，经海事管理机构批准后，方可进出港口：\n（一）所载运的危险货物符合水上安全运输要求；\n（二）船舶的装载符合所持有的证书、文书的要求；\n（三）拟靠泊或者进行危险货物装卸作业的港口、码头、泊位具备有关法律、行政法规规定的危险货物作业经营资质。\n申请人应当在船舶进出港口24小时前（航程不足24小时的，在驶离上一港口前），向海事管理机构办理船舶载运危险货物申报手续，提交下列材料：\n（一）船舶载运危险货物申报单；\n（二）船舶适装证书；\n（三）港口、码头、泊位应具备的有关法律、行政法规规定的港口经营许可证、港口危险货物作业附证。\n船舶在运输途中发生危险货物泄漏、燃烧或者爆炸等情况的，应当在办理船舶载运危险货物申报手续时说明原因、已采取的控制措施和目前状况等有关情况，并于抵港后送交详细报告。\n定船舶、定航线、定货种的船舶可以办理定期申报手续。定期申报期限不超过30日。\n船舶载运危险货物申报单的式样由交通运输部海事局制定，主要包括危险货物的名称、特性、包装以及船舶进出港和停留时间、所载运的危险货物符合水上安全运输要求的声明等内容。", "**第二十二条** 海事管理机构应当在收到船舶载运危险货物进出港口完整齐备的申报材料后24小时内做出批准或者不批准的决定；属于定期申报的，应当在5个工作日内做出批准或者不批准的决定。不予批准的，应当告知申请人不予批准的原因。海事管理机构应当将有关申报信息通报所在地港口行政管理部门。", "**第二十三条** 拟交付船舶载运的危险货物托运人应当在交付载运前向承运人提交以下材料，说明所托运的危险货物的正式名称、种类、数量、危险性质、应当采取的防护措施以及发生危险情况的应急处置措施等货物信息，并报告海事管理机构：\n（一）危险货物安全适运声明书；\n（二）危险货物安全技术说明书；\n（三）按照规定需要进出口国家有关部门同意后方可载运的，应当提交有效的批准文件；\n（四）危险货物中添加抑制剂或者稳定剂的，应当提交抑制剂或者稳定剂添加证明书；\n（五）载运国际海上危险货物运输规则和国家危险货物品名表上未列明但具有危险特性的货物，应当提交有关专业机构出具的表明该货物危险特性以及应当采取的防护措施等情况的文件；\n（六）交付载运包装危险货物的，还应当提交下列材料：\n1．包装、货物运输组件、船运刚性中型散装容器的检验合格证明；\n2．使用船运集装箱载运危险货物的，应当提交《集装箱装箱证明书》；\n3．载运放射性危险货物的，应当提交《放射性物品运输安全管理条例》《国际海运危险货物规则》规定的相关材料；\n4．载运限量或者可免除量危险货物的，应当提交限量或者可免除量危险货物证明。\n（七）交付载运具有易流态化特性的B组固体散装货物通过海上运输的，还应当提交具有相应资质的检验检测机构出具的货物适运水分极限和货物水分含量证明。\n承运人应当对上述货物信息进行审核，对不符合船舶适装要求的，不得受载、承运。", "**第二十四条** 船舶载运包装危险货物或者B组固体散装货物离港前，应当将列有所载危险货物的装载位置清单、舱单或者详细配载图向海事管理机构报告。", "**第二十五条** 船运集装箱拟拼装运输有隔离要求的两种或者两种以上危险货物，应当符合《国际海运危险货物规则》的规定。危险货物托运人应当事先向海事管理机构报告。"]}, {"title": "第五章 作业安全管理", "articles": ["**第二十六条** 载运危险货物的船舶在装货前，应当检查货物的运输资料和适运状况。发现有违反本规定情形的不得装运。", "**第二十七条** 从事散装危险货物装卸作业的船舶和码头，应当遵守安全和防污染操作规程，建立并落实船岸安全检查表制度，并严格按照船岸安全检查表的内容要求进行检查和填写。\n载运散装液体危险货物的船舶装卸作业期间，禁止其他无关船舶并靠。使用的货物软管应当符合相关法规、技术规范的要求，并定期进行检验。", "**第二十八条** 从事散装液化气体装卸作业的船舶和码头、装卸站应当建立作业前会商制度，并就货物操作、压载操作、应急等事项达成书面协议。\n从事散装液化天然气装卸作业的船舶和码头、装卸站还应当采取装货作业期间在船上设置岸方应急切断装置控制点和卸货作业期间在岸上设置船方应急切断装置控制点等措施，确保在发生紧急情况时及时停止货物输送作业。\n协助散装液化气船舶靠离泊的船舶应当设置烟火熄灭装置及实施烟火管制。\n禁止其他无关船舶在作业期间靠泊液化气码头、装卸站。", "**第二十九条** 船舶进行危险货物水上过驳作业或者载运危险货物的船舶进行洗（清）舱、驱气、置换，应当符合国家水上交通安全和防治船舶污染环境的管理规定及技术规范，尽量远离船舶定线制区、饮用水水源保护区、渡口、客轮码头、通航建筑物、大型桥梁、水下通道、水上水下作业或者活动安全作业区、内河等级航道和沿海设标航道，编制作业方案，制定安全和防污染的措施和应急计划并保证有效实施。", "**第三十条** 载运危险货物的船舶进行洗（清）舱、驱气或者置换活动期间，不得检修和使用雷达、无线电发报机、卫星船站；不得进行明火、拷铲及其他易产生火花的作业；不得使用供应船、车进行船舶燃料加注、加水作业。", "**第三十一条** 载运危险货物的船舶在港口水域内从事危险货物过驳作业，应当由负责过驳作业的港口经营人依法向港口行政管理部门提出申请。港口行政管理部门在审批时，应当就船舶过驳作业的水域征得海事管理机构的同意，并将审批情况通报海事管理机构。\n船舶在港口水域外从事内河危险货物过驳作业或者海上散装液体危险货物过驳作业，应当依法向海事管理机构申请批准。\n船舶进行水上危险货物过驳作业的水域，由海事管理机构发布航行警告或者航行通告。", "**第三十二条** 船舶在港口水域外从事内河危险货物过驳作业或者海上散装液体危险货物过驳作业的，应当符合以下条件：\n（一）拟进行过驳作业的船舶或者水上设施满足水上交通安全与防治船舶污染水域环境的要求；\n（二）拟过驳的货物符合安全过驳要求；\n（三）参加过驳作业的人员具备法律、行政法规规定的过驳作业能力；\n（四）拟作业水域及其底质、周边环境适宜过驳作业；\n（五）过驳作业对水域资源以及附近的军事目标、重要民用目标不构成威胁；\n（六）有符合安全要求的过驳作业方案、安全保障措施和应急预案。\n申请人应当在作业前向海事管理机构提出申请，并提交下列材料：\n（一）水上过驳作业申请书；\n（二）拟进行过驳作业的船舶或者水上设施适装证书；\n（三）拟过驳的危险货物安全技术说明书；\n（四）参加过驳作业的人员具备法律、行政法规规定的过驳作业能力的证明材料；\n（五）拟作业水域及其底质、周边环境适宜开展过驳作业且对水域资源以及附近军事、重要民用目标不构成威胁的证明材料，包括拟过驳作业水域概况和环境状况、限制作业的条件等；\n（六）过驳作业方案，包括拟进行过驳作业所需配备的有关设备、器材的清单和辅助船资料，按规定需经检验的设备需提交有关检验文件；\n（七）过驳作业安全保障措施和应急预案。\n海事管理机构自收到完整齐备的申请材料之时起，对单航次作业的船舶，应当在24小时内做出批准或者不批准的决定；对在特定水域多航次作业的船舶，应当在5个工作日内做出批准或者不批准的决定。", "**第三十三条** 海事管理机构应当在港口水域外过驳作业前，根据过驳作业水域范围、自然环境、交通状况等因素合理核定安全作业区的范围，并向社会公告。\n从事过驳作业的船舶应当在安全作业区内进行作业，并设置安全警示标志，配备必要的安全设施或者警戒船，无关船舶、海上设施或者内河浮动设施不得进入。", "**第三十四条** 船舶从事加注液化天然气及其他具有低闪点特性的气态燃料作业活动，应当遵守有关法规、标准和相关操作规程，落实安全措施，并在作业前将作业的种类、时间、地点、单位和船舶名称等信息向海事管理机构报告；作业信息变更的，应当及时补报。\n通过船舶为液化天然气及其他具有低闪点特性的气态燃料水上加注船、趸船补给货物燃料的，应当执行本规定水上过驳的要求。", "**第三十五条** 载运危险货物的船舶应当遵守海事管理机构关于航路、航道等区域性的特殊规定。\n载运爆炸品、放射性物品、有机过氧化物、闪点28℃以下易燃液体和散装液化气的船舶，不得与其他驳船混合编队拖带。", "**第三十六条** 散装液化天然气船舶应当在抵港72小时前（航程不足72小时的，在驶离上一港口时）向抵达港海事管理机构报告预计抵港时间。预计抵港时间有变化的，还应当在抵港24小时前（航程不足24小时的，在驶离上一港口时）报告抵港时间。", "**第三十七条** 散装液化气船舶进出港口和在港停泊、作业，应当按照相关标准和规范的要求落实安全保障措施。在通航水域进行试气试验的，试气作业单位应当制定试验方案并组织开展安全风险论证，落实安全管理措施。\n载运散装液化天然气船舶及载运其他具有低闪点特性的气态燃料的船舶，进出沿海港口和在港停泊、作业，应当通过开展专题论证，确定护航、安全距离、应急锚地、安全警示标志等安全保障措施。\n载运散装液化天然气船舶及载运其他具有低闪点特性的气态燃料的船舶，在内河航行、停泊、作业时，应当落实海事管理机构公布的安全保障措施。海事管理机构根据当地实际情况评估论证，确定护航、合理安全距离、声光警示标志等安全保障措施，征求相关港航管理部门意见后向社会公布。在船舶吨位、载运货物种类、航行区域、航线相同，且周边通航安全条件没有发生重大变化的情况下，不再重新进行评估论证。", "**第三十八条** 载运危险货物的船舶发生水上险情、交通事故、超标排放、危险货物落水等事件，应当按照规定向海事管理机构报告，并及时启动应急预案，防止损害、危害的扩大。\n海事管理机构接到报告后，应当立即核实有关情况，按照相关应急预案要求向上级海事管理机构和县级以上地方人民政府报告，并采取相应的应急措施。", "**第三十九条** 载运散装液体危险货物的内河船舶卸货完毕后，应当在具备洗舱条件的码头、专用锚地、洗舱站点等对货物处所进行清洗，洗舱水应当交付港口接收设施、船舶污染物接收单位或者专业接收单位接收处理。\n载运散装液体危险货物的内河船舶，有以下情形之一的，可以免于前款规定的清洗：\n（一）船舶拟装载的货物与卸载的货物一致；\n（二）船舶拟装载的货物与卸载的货物相容，经拟装载货物的所有人同意；\n（三）已经实施海事管理机构确认的可替代清洗的通风程序。\n卸货港口没有接收能力，船舶取得下一港口的接收洗舱水书面同意，可以在下一港口清洗，并及时报告海事管理机构。", "**第四十条** 载运危险货物的船舶航行、装卸或者停泊，应当悬挂专用的警示标志，按照规定显示专用信号。\n载运散装液化天然气的船舶在内河航行，应当事先确定航行计划和航线。\n载运散装液化天然气的船舶由沿海进入内河水域的，应当向途经的第一个内河港口的海事管理机构报告航行计划和航线；始发地为内河港口的，船舶应当将航行计划和航线向始发地海事管理机构报告。"]}, {"title": "第六章 法律责任", "articles": ["**第四十一条** 海事管理机构依法对船舶载运危险货物实施监督检查。\n海事管理机构发现船舶载运危险货物存在安全隐患的，应当责令立即消除或者限期消除隐患；有关单位和个人不立即消除或者逾期不消除的，海事管理机构可以依据法律、行政法规的规定，采取禁止其进港、离港，或者责令其停航、改航、停止作业等措施。", "**第四十二条** 船舶载运危险货物违反本规定的，由海事管理机构按照有关法规和本规定予以处罚。\n涉嫌构成犯罪的，由海事管理机构依法移送国家司法机关。", "**第四十三条** 违反本规定，托运人在内河通航水域托运危险货物，有下列情形之一的，由海事管理机构责令改正，处3000元以上3万元以下的罚款：\n（一）在托运的普通货物中夹带危险货物或者将危险货物谎报、匿报为普通货物托运；\n（二）未按照有关规定对危险货物妥善包装，并显示标志、标记和标牌；\n（三）未将托运的危险货物的正式名称、种类、数量、危险性质、应当采取的防护措施以及发生危险情况的应急处置措施等货物信息通知承运人；\n（四）未依法提交有关专业机构出具的表明该货物危险特性以及应当采取的防护措施等情况的文件。", "**第四十四条** 违反本规定，载运危险货物的船舶未按照有关强制性标准和安全作业操作规程的要求，在内河通航水域从事危险货物装卸、过驳作业的，由海事管理机构责令改正，对违法船舶的所有人、经营人或者管理人处5000元以上3万元以下的罚款，对船长、责任船员或者其他责任人员，处1000元以上1万元以下的罚款。", "**第四十五条** 违反本规定，对不符合《海运危险货物集装箱装箱安全技术要求》的危险货物集装箱签署《集装箱装箱证明书》的，由海事管理机构责令改正，对聘用该集装箱装箱现场检查员的单位处1000元以上3万元以下的罚款。", "**第四十六条** 违反本规定，有下列情形之一的，由海事管理机构责令改正，处500元以上3万元以下的罚款：\n（一）交付船舶载运的危险货物托运人未向海事管理机构报告的；\n（二）船舶载运包装危险货物或者B组固体散装货物离港前，未按照规定将清单、舱单或者详细配载图报海事管理机构的；\n（三）散装液化天然气船舶未按照规定向海事管理机构报告预计抵港时间的；\n（四）散装液化天然气船舶在内河航行，未按照规定向海事管理机构报告航行计划和航线的。", "**第四十七条** 海事管理机构的工作人员有滥用职权、徇私舞弊、玩忽职守等严重失职行为的，由其所在单位或者上级机关依法处理；情节严重构成犯罪的，由司法机关依法追究刑事责任。"]}, {"title": "第七章 附  则", "articles": ["**第四十八条** 本规定所称船舶载运的危险货物，包括：\n（一）《国际海运危险货物规则》(IMDG code)第3部分危险货物一览表中列明的包装危险货物，以及未列明但经评估具有安全危险的其他包装货物；\n（二）《国际海运固体散装货物规则》（IMSBC code）附录1中B组固体散装货物，以及经评估具有化学危险的其他固体散装货物；\n（三）《国际防止船舶造成污染公约》（MARPOL公约）附则I附录1中列明的散装油类，以及国际海事组织通过文件强制要求各缔约国按照MARPOL公约附则I管理的散装油类；\n（四）《国际散装危险化学品船舶构造和设备规则》（IBC code）第17章中列明的散装液体化学品，以及未列明但经评估具有安全危险的其他散装液体化学品；\n（五）《国际散装液化气体船舶构造和设备规则》（IGC code）第19章列明的散装液化气体，以及未列明但经评估具有安全危险的其他散装液化气体；\n（六）我国加入或者缔结的国际条约、国家标准规定的其他危险货物。\n《危险化学品目录》中所列物质，不属于前款规定的危险货物的，应当按照《危险化学品安全管理条例》的有关规定执行。", "**第四十九条** 本规定所称B组固体散装货物，是指在《国际海运固体散装货物规则》附录1“组别”栏中列为B组货物或者同时列入A和B组货物。", "**第五十条** 通过其他方式运输禁止通过内河运输的危险化学品，应当符合相关法规、标准、规范的要求。", "**第五十一条** 本规定自2025年3月1日起施行。2018年7月31日以交通运输部令2018年第11号公布的《船舶载运危险货物安全监督管理规定》同时废止。\n中华人民共和国交通运输部发布"]}]}, {"id": "reg2", "title": "海运固体散装货物安全监督管理规定", "issuer": "交通运输部令 2019 年第 1 号（2022 年第 25 号修正）", "effective": "2019-03-01", "source": "https://www.gov.cn/zhengce/2022-10/08/content_5728975.htm", "chapter_count": 9, "article_count": 43, "chapters": [{"title": "第一章 总 则", "articles": ["**第一条** 为了加强海运固体散装货物监督管理，保障海上人命、财产安全，依据《中华人民共和国海上交通安全法》《中华人民共和国港口法》等法律，制定本规定。", "**第二条** 船舶在中华人民共和国管辖海域内从事载运固体散装货物，适用本规定。", "**第三条** 交通运输部主管全国海运固体散装货物的安全管理工作。\n国家海事管理机构按照职责负责全国海运固体散装货物的安全监督管理工作。\n其他各级海事管理机构按照各自职责权限具体负责海运固体散装货物的安全监督管理工作。", "**第四条** 船舶载运B组固体散装货物的，还应当遵守《船舶载运危险货物安全监督管理规定》。"]}, {"title": "第二章 一般规定", "articles": ["**第五条** 从事固体散装货物运输的船舶所有人、经营人或者管理人，按照交通运输部有关规定建立和实施的船舶安全营运和防污染管理体系或者制度，应当包括载运固体散装货物的程序、须知或者管理制度。", "**第六条** 载运固体散装货物的船舶，其船舶装载手册或者稳性计算书中应当列出所载货物安全适运的典型工况。", "**第七条** 船舶载运固体散装货物，应当符合有关积载、隔离和运输的安全技术规范，并符合相应适装证书或者证明文书的要求。", "**第八条** 船舶所有人、经营人或者管理人应当对船员进行固体散装货物专业知识培训和考核，保证船员熟悉固体散装货物的特性、操作规程及应急预案。", "**第九条** 按照本规定办理报告手续的人员，应当熟悉相关法规、标准规范和报告程序。", "**第十条** 拟交付船舶运输的固体散装货物如果未在《国际海运固体散装货物规则》中列出，其托运人应当提交具有相应资质的检测机构（以下简称检测机构）出具的鉴定材料，明确货物的分组、分类、危险性、污染危害性和船舶载运技术条件后，方可交付船舶运输。", "**第十一条** 对环境有害的固体散装货物，船舶卸货完毕后，货物残余物及其洗舱水应当由港口接收设施或者船舶污染物接收单位接收，禁止排放入水，并按照规定在垃圾记录簿中如实记载。"]}, {"title": "第三章 报告管理", "articles": ["**第十二条** 载运B组以外固体散装货物船舶进出港口，应当在进出港口24小时前向海事管理机构报告。航程不足24小时的，应当在驶离上一港口前报告。报告应当包括以下信息内容：\n（一）船名、航次、国籍、始发港、卸货港、作业地点、预计进出港口和作业时间等船舶信息；\n（二）货物名称、组别、类别、联合国编号、总重量和装载位置等货物信息。", "**第十三条** 拟交付船舶运输固体散装货物的托运人，应当在交付运输前向承运人提交以下货物信息，并报告海事管理机构：\n（一）固体散装货物安全适运声明书；\n（二）属于易流态化固体散装货物的，应当提交检测机构出具的货物适运水分极限和货物水分含量证明；\n（三）载运未在《国际海运固体散装货物规则》中列出的货物，应当提交检测机构出具的货物运输条件鉴定材料；\n（四）国际航行船舶按照规定需要进出口国家的有关部门批准后方可载运的，应当提交有效的批准文件；\n（五）海事管理机构根据《国际海运固体散装货物规则》规定，要求提供的其他证书或者文书。\n港口作业委托人应当在固体散装货物装载前，将前款第（一）项至第（三）项的货物信息提供给港口经营人。", "**第十四条** 需要通过检测获得货物信息的，应当由托运人与检测机构共同对货物进行采样。", "**第十五条** 承运人应当对货物信息进行审核，对不符合船舶适装要求的，不得承运。承运期间相关材料、证书或者文书应当保存在船上。"]}, {"title": "第四章 作业管理", "articles": ["**第十六条** 载运固体散装货物船舶在装货前，应当按照船舶装载手册或者船舶稳性资料，检查货物的运输资料和适运状况，发现不符合本规定情形的不得装运。", "**第十七条** 从事固体散装货物装卸作业的船舶和港口经营人，应当遵守安全和防污染操作规程，建立并落实船岸安全检查表制度，严格按照船岸安全检查表的要求进行检查和填写。\n从事固体散装货物装卸作业的港口经营人，应当指定具有相应专业和履职能力的人员负责对船舶装卸作业进行巡查监督。\n港口经营人应当加强作业人员相应专业知识和业务操作能力培训。作业人员在装卸作业期间应当遵守相关安全制度和作业规程。", "**第十八条** 载运固体散装货物船舶和港口经营人应当在固体散装货物装卸作业前以书面形式确定装卸计划，并按照装卸计划进行作业。\n发现货物装卸作业与装卸计划不符或者可能存在安全隐患的，载运固体散装货物船舶和港口经营人应当共同进行核实，并采取必要的安全措施。", "**第十九条** 港口经营人应当根据载运固体散装货物船舶提供的配载、积载要求装载货物，进行平舱。装载完毕后，港口经营人应当进行检查并由船长书面确认。", "**第二十条** 船舶应当根据固体散装货物性质合理装载和积载。不相容货物之间应当进行隔离。\n船舶载运高密度固体散装货物时，应当在各舱及同一舱内合理分布，避免对船舶结构和强度造成不利影响。"]}, {"title": "第五章 易流态化固体散装货物的特别规定", "articles": ["**第二十一条** 易流态化固体散装货物的托运人，应当按照《国际海运固体散装货物规则》的规定，制定并实施货物取样、试验和控制水分含量的程序。", "**第二十二条** 拟交付船舶载运的易流态化固体散装货物，水分含量不得超过其适运水分极限。但是，已经建造或者设置防止货物移动的特殊结构、设备，并持有相应检验证书的中国籍船舶，或者持有相应检验、批准证书的外国籍船舶除外。", "**第二十三条** 拟交付船舶载运的易流态化固体散装货物，其托运人应当提交检测机构出具的含有货物适运水分极限、水分含量等技术指标的检测报告。\n适运水分极限的采样和检测应当在货物计划装船前6个月内完成；水分含量的采样和检测应当在货物计划装船前7天内完成。\n货物装船前或者装船期间有下列情形之一的，托运人应当重新对货物水分含量进行采样和检测：\n（一）因降水等情形可能引起货物水分含量升高或者其他特性变化；\n（二）船长有充分理由认为拟装载货物与其水分含量证明不相符。", "**第二十四条** 利用船舶或者码头装卸设施直接转运易流态化固体散装货物，转运作业委托人应当提供货物原有的安全适运声明书、适运水分极限和水分含量证明等资料。\n转运作业前，转运作业委托人、承运转运货物船舶应当共同对拟转运货物进行检查，确认货物形态无变化的，方可进行转运作业。\n转运作业委托人应当在转运货物船舶离港前，向船舶和海事管理机构提交检测机构对转运货物水分含量的检测报告。", "**第二十五条** 露天储存易流态化固体散装货物，所用堆场应当具备良好的排水功能，并根据天气情况和货物性质采取适当措施，防止货物水分含量增加。\n港口经营人装载易流态化固体散装货物的，应当对适运水分极限、水分含量检测报告等货物信息进行核对，经核对无误后方可作业。\n港口经营人在作业过程中应当做好作业情况记录，将装卸作业有关信息和单证存档，并自觉接受和配合港口行政管理部门依据职责实施监督管理。\n港口经营人在装船前或者装船过程中发现货物不符合规定要求的，应当告知船舶并配合船舶不予装载或者停止装载。", "**第二十六条** 在易流态化固体散装货物装船前，船舶应当检查货物处所舱盖风雨密状况，测试货物处所的污水系统是否工作正常，采取措施防止货物进入舱底污水阱，并做好记录。", "**第二十七条** 易流态化固体散装货物装船期间，遇降水等可能引起货物水分含量升高或者其他特性变化的情形，船舶和港口经营人应当立即采取停止作业、关闭舱盖等安全措施。", "**第二十八条** 载运易流态化固体散装货物船舶，应当根据所载货物的特性和航行区域特点制定货物处所定期巡查计划。\n船舶在航行过程中应当按照巡查计划进行定期巡查，并记录巡查情况。发现货物具有流态化趋势或者已经流态化的，应当立即采取应急措施，并向就近的海事管理机构报告。"]}, {"title": "第六章 人员防护与事故预防", "articles": ["**第二十九条** 船舶载运可能释放有毒气体、易燃气体或者造成货物处所缺氧的固体散装货物时，应当配备相应的气体测量仪器及其使用说明书，按照规定定期测量货物处所气体浓度，并记录测量结果。", "**第三十条** 船舶载运可能释放有毒气体的固体散装货物时，应当对货物处所提供机械通风或者自然通风。\n船舶载运可能释放易燃气体的固体散装货物时，应当对货物处所提供机械通风。", "**第三十一条** 船舶应当制定针对人员进出封闭处所和货物熏蒸处所的安全程序及应急救援措施，在处所入口处设立警示标志。", "**第三十二条** 装载具有毒害性、腐蚀性或者造成货物处所缺氧的固体散装货物时，相关作业人员应当事先经过训练，配备防护设备。紧急情况下需进入货物处所的，应当按照安全程序在船长或者其指定的具有管理职责的船员监督下进行。"]}, {"title": "第七章 监督管理", "articles": ["**第三十三条** 海事管理机构发现载运固体散装货物的船舶存在安全隐患的，应当责令立即或者限期消除隐患，不立即消除或者逾期不消除的，采取禁止其进港、离港或者责令其停航、改航、停止作业等措施。", "**第三十四条** 港口行政管理部门应当依据职责对辖区内固体散装货物港口储存、装卸作业实施监督管理。发现港口经营人储存、装卸固体散装货物存在安全隐患的，应当责令立即或者限期消除隐患，不立即消除或者逾期不消除的，采取责令其停止作业等措施。"]}, {"title": "第八章 法律责任", "articles": ["**第三十五条** 违反本规定，有下列情形之一的，由海事管理机构责令改正，处1万元以上3万元以下的罚款：\n（一）船舶未按照规定采取停止作业、关闭舱盖等安全措施的；\n（二）船舶未配备气体测量仪器或者未对货物处所气体浓度进行测量的；\n（三）船舶未建立并落实船岸安全检查表制度，或者未按照船岸安全检查表的要求进行检查和填写的。", "**第三十六条** 违反本规定，有下列情形之一的，由海事管理机构责令改正，处3000元以上3万元以下的罚款：\n（一）船舶在进出港口前未向海事管理机构报告的；\n（二）固体散装货物的托运人、转运作业委托人未向承运人、海事管理机构提交货物相关信息的。", "**第三十七条** 违反本规定，有下列情形之一的，由港口行政管理部门责令港口经营人立即纠正或者限期改正：\n（一）未根据天气情况和货物性质对易流态化固体散装货物采取适当措施防止货物水分含量增加的；\n（二）未根据船舶提供的配载、积载要求装载货物或者进行平舱的。", "**第三十八条** 违反本规定，有下列情形之一的，由港口行政管理部门责令改正，处1万元以上3万元以下的罚款：\n（一）港口经营人在装船前或者装船过程中发现货物不符合规定要求，未告知船舶或者停止装载的；\n（二）港口经营人在装船过程中遇降水等情形无法保证作业和运输安全时，未停止作业的。", "**第三十九条** 违反本规定，有下列情形之一的，由港口行政管理部门责令改正，处1万元以上3万元以下的罚款：\n（一）港口经营人未建立并落实船岸安全检查表制度，或者未按照船岸安全检查表的要求进行检查和填写的；\n（二）港口经营人未指定人员在装卸作业期间进行巡查监督的；\n（三）港口经营人未对货物信息进行核对的。", "**第四十条** 船舶载运的固体散装货物属于危险化学品并违反本规定的，按照《危险化学品安全管理条例》进行处罚。", "**第四十一条** 海事管理机构、港口行政管理部门的工作人员有滥用职权、徇私舞弊、玩忽职守等严重失职行为的，由其所在单位或者上级机关依法处理；情节严重构成犯罪的，由司法机关依法追究刑事责任。"]}, {"title": "第九章 附 则", "articles": ["**第四十二条** 本规定下列用语的含义是：\n固体散装货物，是指除谷物以外的，不需包装可直接装入船舶的货物处所，由基本均匀的微粒、颗粒或者较大的块状固体物质组成的货物。\nB组固体散装货物，是指在《国际海运固体散装货物规则》附录1“组别”栏中列为B组货物或者同时列入A和B组货物。\n典型工况，是指船舶满载出港、满载到港、压载出港、压载到港的基本装载情况。\n对环境有害的固体散装货物，是指符合《国际防止船舶造成污染公约》附则V有关对海洋环境有害物质判定标准的固体散装货物。\n高密度固体散装货物，是指每吨货物在货舱中正常堆积时所占空间小于或者等于0.56m3的固体散装货物。\n易流态化固体散装货物，是指含有部分细颗粒和一定量水分的，当水分含量超过适运水分极限时会流态化的固体散装货物。\n适运水分极限，是指确保易流态化固体散装货物安全运输的最大水分含量。", "**第四十三条** 本规定自2019年3月1日起施行。"]}]}, {"id": "reg3", "title": "船载危险货物申报员和集装箱装箱现场检查员管理办法", "issuer": "海危防〔2017〕548 号 — 交通运输部海事局", "effective": "2018-01-01", "source": "https://fgw.sh.gov.cn/ys-gjmy-1.2.1.3.4/20240314/f02357f129cf4b18ba17be34f2dd9324.html", "chapter_count": 6, "article_count": 36, "chapters": [{"title": "第一章 总 则", "articles": ["**第一条** 为加强船舶载运危险货物申报人员和船舶载运危险货物集装箱装箱现场检查人员的从业管理，规范船载危险货物申报或者集装箱装箱现场检查行为，根据《危险货物水路运输从业人员考核和从业资格管理规定》《中华人民共和国船舶载运危险货物安全监督管理规定》以及我国缔结或者加入的有关国际公约的规定，制定本办法。", "**第二条** 本办法适用于中华人民共和国管辖范围内从事船舶载运危险货物申报或者船舶载运危险货物集装箱装箱现场检查的人员的从业管理。", "**第三条** 交通运输部海事局统一负责船舶载运危险货物申报人员和船舶载运危险货物集装箱装箱现场检查人员从业资格和从业行为的管理工作。\n各级海事管理机构按照各自职责负责本辖区船舶载运危险货物申报人员和船舶载运危险货物集装箱装箱现场检查人员从业资格和从业行为的具体管理工作。", "**第四条** 按照规定从事船载危险化学品申报或者报告的申报人员（简称申报员）或者从事船载危险化学品集装箱装箱现场检查的检查人员（简称检查员），应当按照《危险货物水路运输从业人员考核和从业资格管理规定》的规定，参加海事管理机构组织的从业资格考核，取得相应的从业资格证书。\n申报员和检查员取得从业资格证书后，可以通过网上办理船载危险化学品以及船载危险化学品之外的货物的申报、报告或者集装箱装箱现场检查。未持有从业资格证书的人员拟从事船载危险化学品之外的货物的申报、报告或者集装箱装箱现场检查的，应当按照有关规定接受与其所从事作业相匹配的培训，具备本办法", "**第五条** 规定的能力要求，并通过纸质材料送交所在地海事管理机构办理。\n聘用上述人员的单位应当对所聘用人员的从业行为进行管理，对其从业行为所造成的后果负责。", "**第五条** 船舶载运危险货物申报人员和船舶载运危险货物集装箱装箱现场检查人员，应当了解船载危险货物的危险性、危害性及污染预防措施，掌握安全运输、防污染国际公约和国内法规、标准及申报程序、装箱现场检查的要求，熟悉海事管理机构有关船舶载运危险货物和污染危害性货物安全管理的规定等相关知识。", "**第六条** 申报员或者检查员有下列权利：\n（一）在所在从业单位的管理下，从事危险货物申报或者集装箱装箱现场检查业务。\n（二）查询其办理的申报或者装箱现场检查业务情况。\n（三）对海事管理机构对其作出的决定进行陈述、申辩、申诉。\n（四）依法申请行政复议或者提起行政诉讼。\n申报员或者检查员应当履行以下义务：\n（一）妥善保管海事管理机构核发的《危险化学品水路运输从业资格证书》，参加相关培训并保存培训记录。\n（二）熟悉所申报货物的基本情况，审查所申报内容和有关材料的真实性、完整性。妥善保管申报或者装箱检查业务相关文档，供海事管理机构抽查。\n（三）准确、清楚、完整地填制相关单证，并按照规定办理危险货物申报、装箱现场检查业务及相关手续。\n（四）配合海事管理机构实施开箱查验，以及对违法案件的查处。\n（五）向海事管理机构报告所发现的船载危险货物违法行为。\n（六）与从业单位解除劳动合同时或者不再从业时，及时向海事管理机构报告。", "**第七条** 企业应当与其所聘用的申报员或者检查员签订劳动合同，制定安全生产培训计划，落实培训经费，开展安全教育、法制教育和岗位技术培训，建立培训档案和年度考核制度。"]}, {"title": "第二章 考核管理", "articles": ["**第八条** 拟报名参加从业资格考核的人员，应当符合以下条件：\n（一）具有中华人民共和国国籍。\n（二）年满18周岁，具有完全民事行为能力。", "**第九条** 报名参加从业资格考核的人员应当向海事管理机构提交下列材料：\n（一）报名申请。\n（二）本人有效身份证件复印件。\n海事管理机构应当按职权受理核验报名人员提交的上述材料，对符合要求的核发准考证，并安排参加从业资格考核。\n参加从业资格考核的人员应当持有有效的身份证件和准考证。", "**第十条** 申报员或者检查员从业资格考核由交通运输部海事局统一制定年度考试计划、统一命题和统一评分标准。\n直属海事管理机构和省级地方海事管理机构具体负责本辖区从业资格考核的组织及阅卷核分工作。\n从业资格考核按照危险货物国际水路运输和国内水路运输类型，细分为包装、散装固体、散装液体等种类。", "**第十一条** 组织从业资格考核的海事管理机构在考核结束后20个工作日内，公布考核合格人员名单。", "**第十二条** 对考核结果有异议的，可在考核合格人员名单公布后5个工作日内，向组织考核的海事管理机构申请成绩复查。申请成绩复查，必须由本人提出书面申请，注明姓名、准考证号、所查科目及理由。\n成绩复查仅限各题得分和全卷得分有无漏判、漏加、错加等情况。\n符合成绩复查条件的，海事管理机构应当组织专人进行复查，并在收到申请之日起5个工作日内将复查结果通知申请人。经核查确有错误的，海事管理机构应当立即予以更正。", "**第十三条** 组织考核的海事管理机构在成绩公布后20个工作日内，向考核合格的人员颁发申报员或者检查员考核合格证明，并将颁发情况报告交通运输部海事局。\n申报员或者检查员从业资格考核合格证明由交通运输部海事局统一格式、统一编号。", "**第十四条** 考核合格证明损毁、遗失或者个人信息发生变更的，可向原发证海事管理机构申请补发或者换发，颁发日期为原考核合格证明的颁发日期。"]}, {"title": "第三章 从业资格证书核发", "articles": ["**第十五条** 取得考核合格证明，拟从事船载危险化学品申报和集装箱装箱现场检查的申报员和检查员，应当向组织考核的海事管理机构申请从业资格。", "**第十六条** 申请申报员或者检查员从业资格的，应当符合以下条件并提供相应的证明材料：\n（一）近2年内的考核合格证明。\n（二）首次申请的，应当具有在同1个从业单位连续3个月的相应业务实习经历，提交从业单位的实习证明。\n（三）检查员具有正常辨色力，提交医疗机构出具的体检证明。\n对符合规定且无因谎报、瞒报危险化学品违规行为曾被吊销从业资格的情形的，海事管理机构应当在10个工作日内，做出是否给予从业资格的决定。同意的，应当签发《危险化学品水路运输从业资格证书》；不同意的，应当向申请人说明原因。\n《危险化学品水路运输从业资格证书》的编号、适用的运输类型和种类应当和考核合格证明保持一致，并在全国范围内有效。", "**第十七条** 2年内未从事船载危险化学品申报或者集装箱装箱现场检查的，应当重新申请参加考核并取得从业资格后方可从业。"]}, {"title": "第四章 信息报送", "articles": ["**第十八条** 聘用申报员、检查员以及其他从事船载危险化学品以外货物申报或者集装箱装箱现场检查人员的单位应当将本单位的企业信息表及以下人员信息及时报送所在地海事管理机构：\n（一）被聘用从业人员的姓名及其有效身份证明证号。\n（二）被聘用从业人员的从业区域。\n（三）解聘或者终止劳动合同的从业人员姓名及其有效身份证明证号。\n单位应当将前款所报送信息的证明材料存档，以备海事管理机构抽查。", "**第十九条** 申报员或者检查员应当在《危险化学品水路运输从业资格证书》中明确签注的运输类型和种类范围内依法为其所在从业单位从事船舶载运危险货物的申报与报告、装箱现场检查工作。\n《危险化学品水路运输从业资格证书》中签注的运输类型为国际水路运输的申报员或者检查员可以从事国内水路运输的船舶载运危险货物的申报与报告或者装箱现场检查工作。\n申报员或者检查员从业区域超出范围的，其所在单位应当向新从业区域所在地海事管理机构报送", "**第十八条** 要求的相关材料。\n申报员或者检查员不得同时在2个及以上申报或者装箱单位从业。", "**第二十条** 申报员或者检查员更换从业单位的，其新任职的从业单位应当按照本办法", "**第十八条** 的要求报送相关材料，并提供与上一家从业单位已解除劳动合同的证明。", "**第二十一条** 组织考核的海事管理机构应当将申报员和检查员的姓名、身份证号码、《危险化学品水路运输从业资格证书》编号、适用的运输类型和种类录入交通运输部海事局申报员或者检查员管理系统。\n从业区域所在地海事管理机构应当将从业单位按照本办法", "**第十八条** 要求报送的人员信息录入交通运输部海事局申报员或者检查员管理系统。"]}, {"title": "第五章 记分管理", "articles": ["**第二十二条** 海事管理机构对申报员或者检查员在从业过程中发生的船载危险货物运输安全违法或者违规行为实施记分管理。具体记分行为及相应分值见《危险货物申报员和集装箱装箱检查员记分细则》。", "**第二十三条** 船载危险货物运输安全违法或者违规行为累积记分周期为12个月，记分周期从每年1月1日起至12月31日止。\n新从业的申报员或者检查员记分周期自从业之日起至当年12月31日止，不足1年的，按一个记分周期计算。", "**第二十四条** 申报员或者检查员在1个记分周期内累计记分达到或者超过10分的，由发证地海事管理机构暂停其通过网上办理申报手续2个月，并参加船舶载运危险货物安全管理法律、法规的学习。暂停期满后可恢复通过网上办理申报手续。", "**第二十五条** 申报员或者检查员在1个记分周期内累计记分达到15分的，由发证地海事管理机构暂停其通过网上办理申报手续6个月，并应当参加船舶载运危险货物安全管理法律、法规的学习并参加考核。考核合格的，暂停期满后可恢复通过网上办理申报手续。", "**第二十六条** 申报员或者检查员在1个记分周期内记分累计达到20分的，由发证地海事管理机构暂停其通过网上办理申报手续12个月，并参加船舶载运危险货物安全管理法律、法规和业务知识的学习，按照本人《危险化学品水路运输从业资格证书》注明的从业范围，参加相应科目申报员或者检查员从业资格考核。考核合格的，暂停期满后可恢复通过网上办理申报手续，记分清零。", "**第二十七条** 申报员或者检查员在1个记分周期内累计记分未达到20分，无行政处罚行为或者所处行政处罚已经办结的，记分周期届满时记分予以清除；记分虽未达到20分，未办结的行政处罚对应的记分转入下一记分周期。\n累计达到需学习和考核的记分值，但未参加学习和考核的，暂停其通过网上办理申报手续，直至按照本办法参加学习和考核合格。", "**第二十八条** 海事管理机构对申报员或者检查员记分时，应当将记分原因和分值在交通运输部海事局申报员或者检查员管理系统中进行签注。", "**第二十九条** 申报员或者检查员发生下列行为的，发证地海事管理机构应当公告其《危险化学品水路运输从业资格证书》停止使用：\n（一）申报员或者检查员自行申请停止使用的。\n（二）申报员或者检查员死亡或者丧失民事行为能力的。\n（三）2年内未从事申报或者装箱现场检查的。", "**第三十条** 被停止使用的《危险化学品水路运输从业资格证书》需恢复使用的，申报员或者检查员应当按照本办法重新申请从业资格考核。"]}, {"title": "第六章 附 则", "articles": ["**第三十一条** 本办法所称从业单位系指承运人及其代理人，货物生产企业、所有人或者托运人及其代理人以及受货物生产企业、所有人或者托运人委托进行集装箱装箱现场检查的单位。", "**第三十二条** 本办法自2018年1月1日起施行。1987年2月23日实施的《集装箱装运危险货物现场检查员培训、考核办法》（水监字〔1987〕36号）、1996年9月12日实施的《危险货物申报员考核发证办法》（港监字〔1996〕234号）同时废止。\n附件：1.企业信息表\n2.危险货物申报员和集装箱装箱检查员记分细则\n（试行）\n附件1\n企业信息表\n企业中文名称\n组织机构代码：\n企业英文名称\n企业地址\n经营场所\n工商注册日期\n经营期限\n法定代表人\n企业负责人\n联系人\n联系人电话\n电子邮箱\n传真\n经\n营\n范\n围\n许可经营项目：\n一般经营项目\n业务类型范围\n是否是经营人\n是否是代理人\n水路运输承运人\n口国内 口国际 口否\n口国内 口国际 口否\n货物生产企业\n口是 口否\n口是 口否\n货物所有人\n口是 口否\n口是 口否\n货物托运人\n口是 口否\n口是 口否\n集装箱装箱现场检查单位\n口是 口否\n申报员或者检查员动态信息（可附页）\n聘用或解聘\n从业人员\n姓 名\n身份证号\n资格证书编号\n从业区域\n聘用合同到期时间\n本公司根据《危险货物申报人员和集装箱装箱现场检查员管理办法》及相关法律法规要求，自愿向海事管理机构报送本公司相关信息，并保证本信息表所填内容准确、真实、有效、合法，具备相关资质且能够提供相关证明文件备查，所有信息可查询、可验证，是合法的经营者。如提供虚假信息或文件，本公司愿承担一切责任。\n承诺单位签章\n年 月 日\n附件2\n危险货物申报员和集装箱装箱检查员记分细则（试行）\n一、一次记分的分值，依据违法违规行为的严重程度，分为20分、10分、5分、3分、2分五种。一次有两种及以上记分行为的，应当分别记分，累加分值执行。\n二、申报员按下列标准记分\n（一）申报员有下列行为之一的，一次记20分：\n1.未按规定进行申报或者报告，导致危险货物在装卸或者运输过程中发生事故的。\n2.欺骗、造假、提供虚假证明材料等违法行为。\n3.冒用他人《危险化学品水路运输从业资格证书》办理申报的。\n4.对危险货物发生重大事故负有责任的。\n5.将《危险化学品水路运输从业资格证书》转借或者转让他人使用的。\n6.涂改《危险化学品水路运输从业资格证书》的。\n7.对谎报瞒报危险货物负有责任的。\n（二）申报员有下列行为之一的，一次记10分：\n1.未按规定进行申报或者报告，导致危险货物在装卸或者运输过程中发生险情的。\n2.主管机关在实施监督管理时不予配合的。\n3.申报时申报材料与实际货物状况严重不符或者申报内容与实际船载危险货物状况严重不符的。\n4.发生危险货物漏报、错报行为，情节严重的。\n5.对主管机关提出的整改要求不予落实，或者对发现的违章行为不予纠正的。\n6.从业单位发生变更，继续以原从业单位名义进行申报或者报告的。\n（三）申报员有下列行为之一的，一次记5分：\n1.未对申报或者内容和有关材料的真实性、完整性进行合理审查，导致申报内容与实际船载危险化学品（货物）状况不符，且影响船舶运输安全的。\n2.申报或者报告时未认真审核、填写或者上报申报或者报告相关材料的。\n3.使用无有效资质部门出具的包装适运申报附件单证的。\n4.使用无效船舶适载、货物适装运证明材料的。\n5.未向海事管理机构报告，申报员超出从业区域范围从事船舶载运危险化学品（货物）的申报或者报告的；\n6.对执业从业单位不履行规定导致违规运输的情形，申报员未向海事管理机构报告的。\n（四）申报员有下列行为之一的，一次记3分：\n1.不按规定要求填写申报单证或者发送电子申报信息的。\n2.船载危险化学品（货物）运输作业取消，未及时办理申报撤销手续的。\n3.需要核销的包装适运证明未及时注销出运数量的。\n4.从业单位发生变更，未及时向海事机构报送信息的。\n5.申报所需的相关书面材料未按规定妥善保存的。\n6. 船载危险货物实际状况发生变化，未在船舶进、出港前办理申报变更手续的。\n7.无法完整提供要求留存的申报相关的证明文书的。\n8.留存的附件单证与电子申报附件信息不一致的。\n（五）申报员有下列行为之一的，一次记2分：\n1.申报内容与实际船载危险货物状况不符，情节轻微的。\n2.发生错报或者漏报，情节轻微的。\n3.申报材料或者信息不全，情节轻微的。\n4.无法完整提供要求留存的申报或者报告的相关的附件证明材料的。\n三、检查员按下列标准记分\n（一）检查员有下列行为之一的，一次记20分：\n1.未按规定签发《集装箱装箱证明书》，导致危险化学品（货物）集装箱在装卸或者运输过程中发生事故，造成严重后果的。\n2.欺骗、造假、提供虚假《集装箱装箱证明书》的。\n3.冒用他人检查员证书签发《集装箱装箱证明书》的。\n4.检查员账号转借或者出租给他人使用的。\n5.为非本人从业的单位所装的集装箱签发《集装箱装箱证明书》的。\n6.未到现场监装检查签发《集装箱装箱证明书》的。\n（二）检查员有下列行为之一的，一次记10分：\n1.未按规定签发《集装箱装箱证明书》，导致危险化学品（货物）集装箱在装卸、运输过程中发生事故的。\n2. 主管机关在实施监督管理时不予配合的。\n3.检查员签发的《集装箱装箱证明书》与装箱实际情况严重不符的。\n4. 未按照《海运危险货物集装箱装箱安全技术要求》检查，导致危险货物集装箱装箱质量存在严重缺陷，对船舶运输造成较大安全风险的。\n5. 对主管机关提出的整改要求不予落实，或者对发现的违章行为不予纠正的。\n6.从业单位发生变更，继续以原从业单位名义签发《集装箱装箱证明书》或者填报电子集装箱装箱证明信息的。\n（三）检查员有下列行为之一的，一次记5分：\n1.未按照《海运危险货物集装箱装箱安全技术要求》检查，导致危险货物集装箱装箱质量存在缺陷，影响船舶运输安全的。\n2.检查员签发的《集装箱装箱证明书》与装箱实际情况不符的。\n3.装箱检查工作尚未结束，签发《集装箱装箱证明书》的。\n4.未向海事管理机构报告，检查员超出从业区域范围从事集装箱装箱检查的。\n5.对执业的从业单位不履行规定导致违规运输的情形，检查员未向海事管理机构报告的。\n6.《集装箱装箱证明书》未签字确认和加盖从业单位印章的；\n7.不按规定要求填写《集装箱装箱证明书》或者填报电子集装箱装箱证明信息的。\n（四）检查员有下列行为之一的，一次记3分：\n1.《集装箱装箱证明书》或者电子集装箱装箱证明信息与危险货物申报或者报告信息不符的。\n2.从业单位发生变更，从业单位未及时向海事机构报送信息的；\n3.未核验危险货物适运证明的。\n4.未查核CSC标牌和集装箱箱体状况的。\n5.装箱检查情况未按照规范要求现场拍照的。\n6.装箱检查所需的相关书面材料或者照片未按规定妥善保存的。\n7.留存的书面材料或者照片与申报或者报告的《集装箱装箱证明书》或者电子集装箱装箱证明信息不一致的。\n（五）检查员有下列行为之一的，一次记2分：\n1.集装箱标志未按规定粘贴的。\n2.使用的《集装箱装箱证明书》格式不符合规定要求的。\n3.《装箱作业记录》未如实或者按照规定记录的。\n4.无法完整提供要求留存的装箱检查相关的证明文书的。\n抄送：长江、江苏海事局。\n交通运输部海事局 2017年11月1日印发\n相关附件\n1.2.1.3.4-2 船载危险货物申报员和集装箱装箱现场检查员管理办法.pdf\n分享\n打印本页\n关闭窗口"]}]}, {"id": "imsbc", "title": "国际海运固体散装货物规则 (IMSBC Code)", "issuer": "国际海事组织 (IMO) · 修正案 07-23", "effective": "2025-01-01", "source": "MSC.539(107)号决议", "chapter_count": 53, "article_count": 363, "chapters": [{"title": "第1节 一般规定（概述）", "articles": ["一般规定"]}, {"title": "1.1 注释", "articles": ["**1.1.1** 应当注意的是，还存在其他国际和国家法规，且这些法规可能认可本规则的全部或部 分规定。此外，港口当局及其他机构和组织应认可本规则，并可将其作为在装卸区内 制定储存和装卸细则的依据。"]}, {"title": "1.2 列入本规则的货物", "articles": ["**1.2.1** 目前以散装方式运输的典型货物以及有关其特性和装卸方法的建议，见各货物的明细 表。但是，这些明细表并不详尽，货物的特性仅供参考。因此，在装货前，须从托运人 处获得有关待装运货物物理和化学特性的最新有效信息。托运人须提供有关待装运货 物的适当信息（见第 4.2 节） 。", "**1.2.2** 如固体散装货物具体列于本规则附录 1（各固体散装货物明细表），则除本规则第 1 至 10 节和第 11.1.1 节的规定外，还应按照其明细表的规定运输。船长须考虑是否在必 要时与装货港和卸货港当局就可能生效并适用于运输的要求进行磋商。"]}, {"title": "1.3 未列入本规则的货物", "articles": ["**1.3.1** 如果拟散装运输本规则附录 1 中未列出的固体货物，托运人须在装货前根据本规则第 4 节要求向装货港主管当局提供该货物的特性和属性。主管当局将根据收到的信息对 货物安全运输的可行性进行评估。  1.3.1.1 当评估认为拟承运的固体散装货物可能存在本规则第 1.7 节 A 组或 B 组所定义的危险 时，须征求卸货港和船旗国主管当局的意见。三方主管当局将确定运输该货物的初步 适当条件。 1.3.1.2 如经评估，拟议运输的固体散装货物对运输不存在特定危险，则应批准运输该货物， 并须将该授权通知卸货港和船旗国主管当局。", "**1.3.2** 装货港主管当局须向船长提供一份证书，说明货物的特性以及运输和装卸该批货物所 需的条件。 装货港主管当局还须在证书签发后一年内向本组织提出申请，将该固体散 装货物纳入本规则附录 1。该申请的格式须与第 1.3.3 节规定一致。", "**1.3.3** 未列入本规则的货物特性及载运条件的格式 * 暂定的散装货物运输名称（用大写字母） 说明（描述货物） 特性（填写下列表格） 物理性质 尺寸  静止角  散货密度 （kg/m3）  积载系数 （m3/t）  危险分类 类别  MHB  副危险性  组别  危险性（阐明载运货物的危险性） （确定下列各类要求。如无要求时，注明“没有特别要求”。 ） 积载和隔离 货舱清洁程度 天气注意事项 装载 注意事项 通风 载运 卸货 清扫 （如需要，说明货物的应急程序） 应急程序 配备专用应急设备 应急程序 火灾时的应急行动 医疗急救   参见《国际海运固体散装货物（IMSBC）规则》未列明的货物属性及其载运条件的信息提交和格式填写指南（第 MSC.1/Circ.1453/Rev.2 号通函） 。"]}, {"title": "1.4 本规则的适用和实施", "articles": ["**1.4.1** 本规则所载规定适用于经修正的《安全公约》所适用的所有船舶以及《公约》第 VI 章 A 部分第 1-1 条所定义的载运固体散装货物的船舶。", "**1.4.2** 尽管根据《安全公约》 ，本规则在法律上被视为强制性文书，但本规则的下列条款仍为 建议性或参考性条款： 第 11 节  保安规定（第 11.1.1 小节除外） ；  第 12 节 积载系数换算表； 第 13 节 参考相关信息和建议； 除附录 1（固体散装货物各明细表）和附录 5（三种语言的散装货物运输名称（英文、 西班牙文和法文） ）以外的附录；和 附录 1 中固体散装货物各明细表的“说明”、“特性”（危险分类除外） 、“危险性”、“应急 程序”中的内容。", "**1.4.3** 本规则的某些部分规定了特定的行动，但并没有将执行行动的责任具体分配给任何特 定的人。这种责任可能因不同国家的法律和习俗以及这些国家加入的国际公约而有所 不同。就本规则而言，没有必要进行这种指定，而只需确定行动本身。如何分配这一 责任仍是各国政府的特权。"]}, {"title": "1.5 免除和等效措施", "articles": ["**1.5.1** 当本规则要求运输固体散装货物须符合某项规定时，一个或多个主管当局（出发港港 口国、到达港港口国或船旗国）如确信任何其他规定至少与本规则所要求的规定同样 有效和安全，则可授权豁免。非本节缔约方的主管当局是否接受根据本节授权的豁免， 由该主管当局自行决定。因此，在豁免所涉及的任何装运之前，豁免的接受者须通知 其他有关主管当局。", "**1.5.2** 主动提出豁免的一个或多个主管当局： .1  须向本组织递交一份有关豁免的副本，由本组织提请《安全公约》缔约国注意； 和  .2", "**1.5.3** 须酌情采取行动修订本规则，以包括豁免所涉及的条款。  豁免的有效期自批准之日起不超过五年。不在第 1.5.2.2 款规定范围内的豁免可根据本 节规定进行延期。", "**1.5.4** 根据豁免规定运输固体散装货物的每艘船舶均须酌情保存一份豁免副本或电子副本。", "**1.5.5** 主要指定的有关国家主管当局的联系信息载于本组织发布的单独文件。"]}, {"title": "1.6 公约", "articles": ["经修正的《安全公约》第 VI 章 A 和 B 部分以及第 VII 章 A-1 部分分别涉及固体散装货 物的载运和固体散装危险货物的载运，下文仅转载相关部分。", "第 VI 章 货物和燃油的载运 A 部分", "一般规定 第1条", "适用范围 1", "除另有明文规定外，本章适用于因其对船舶或船上人员的特殊危险性，可能需在本规", "则适用的所有船舶及小于 500 总吨的货船上采取特别预防措施的货物的装运（散装液体、散装气 体和其他章节内已作出装运规定的除外） 。但是，对于小于 500 总吨的货船，如果主管机关认为因 其航行的遮蔽性和条件使本章 A 部分或 B 部分的任何具体要求的适用不合理的或不必要，则可采 取其他有效措施，以确保这些船舶所需的安全。 2", "作为本章 A 和 B 部分规定的补充，各缔约国政府须确保提供有关货物及其积载和系固的适", "当资料，特别说明安全载运此类货物所需的预防措施。 * 第 1-1 条", "定义 就本章而言，除非另有明确规定，须适用以下定义： 1", "《国际散固规则》系指本组织海上安全委员会以第 MSC.268(85)号决议通过的《国际", "海运固体散装货物规则》 （《国际散固规则》 ），可由本组织修正，但此类修正案须按照《公约》 第 VIII 条关于第 I 章以外适用的附则修正程序的规定通过、生效和实施。 2", "固体散装货物系指除液体或气体外的任何货物，由颗粒、粒状或较大块状物质组合而", "成，一般成分均匀，由直接装入船舶货物处所，毋需任何中间包装的围封。", "参见： （经修正的第 A.714(17)号大会决议） ； .1 《货物积载和系固安全操作规则》 .2 《2011 年船舶载运木材甲板货安全操作规则》 （《2011 年木材甲板货物规则》 （第 A.1048(27)号大会决议） ） 、 《关于船长小于 100 米的船舶载运原木时船长应采取预防措施的导则》 （第 MSC/Circ.525 号通函）和《关 于船舶载运木材货物时船长应采取预防措施的导则》（第 MSC/Circ.548 号通函）；和 .3", "《国际散固规则》 （经修正的第 MSC.268(85)号决议） 。", "第 1-2 条", "谷物以外的固体散装货物的载运要求 谷物以外的固体散装货物的载运须符合《国际散固规则》的相关规定。 第2条", "货物信息 1 托运人须在装货前充分提前向船长或其代表提供有关货物的适当信息，以便采取适当 积载和安全装运货物所需的预防措施。此类信息 *须在货物装船前通过适当的运输单证以书面 形式 †确认。 2", "3", "货物信息须包括： .1", "对于杂货和货物组件载运的货物，须有货物的一般描述、货物或货物组件的毛重 及货物的任何相关特殊属性。就本条而言，须提供本组织根据第 A.714(17)号大 会决议通过的《货物积载和系固安全操作规则》第 1.9 小节（可能经修正）所要 求的货物信息。对第 1.9 小节的任何此类修正案须根据现行《公约》第 VIII 条关 于适用于第 I 章以外的附则修正程序的规定通过、生效和实施。", ".2", "对于固体散装货物，须有《国际散固规则》第 4 节要求的信息。", "在货物组件装船前，托运人须确保此类货物组件的毛重与运输单证中标明的毛重一致。", "4 对于集装箱 ‡ 装载的货物，本条第 2.1 款规定的毛重须由托运人通过以下方式验证， 但用底盘或拖车运载的集装箱，如在第 III/3 条规定的国际短途滚装船上驶入或驶出不在此列。 对于集装箱内装载的货物，但不包括用底盘或拖车装载的集装箱，当此类集装箱在驶入或驶离 第 III/3 条规定的国际短途滚装船时，本条第 2.1 款规定的毛重须由托运人通过以下方式核实：", "5", ".1", "使用经校准和认证的设备对包装好的集装箱进行称重；或", ".2", "对所有包装件和货物物品进行称重，包括集装箱内包装的托盘、垫料和其他固定 材料的重量，并将集装箱的皮重添加到单件重量的总和中，称重方法须经完成集 装箱包装完成所在国的主管机关批准。", "集装箱托运人须确保在装运单据中注明经核实的毛重 §。装运单证须： .1", "由托运人正式授权的人员签署；且", ".2", "按照船长或其代表的要求，提前足够时间提交给船长或其代表以及码头代表，以 用于编制船舶积载图。 **", "参见《货物信息表》 （第 MSC/Circ.663 号通函） 。", "本条所指的单证并不排除使用电子数据处理（EDP）和电子数据交换（EDI）传输技术作为纸质单证的辅助手段。 “集装箱” 一词应被视为与经修正的《1972 年国际集装箱安全公约(CSC)》所定义和适用的含义相同，并虑及 《公海上装卸的离岸集装箱的认可导则》(第 MSC/Circ.860 号通函)和《经修正的<1972 年国际集装箱安全公约>统 一解释和实施的修订建议案》(第 CSC.1/Circ.138/Rev.1 号通函)。 参见《载货集装箱验证总质量导则》 （MSC.1/Circ.1475） 。 ** 本文件可通过 EDP 或 EDI 传输技术来呈现。签名可以是电子签名，也可以用授权签名人的大写姓名代替。", "6", "如果装货集装箱的装运单据未提供经核实的毛重，且船长或其代表和码头代表未获得", "装货集装箱的核实毛重，则不得将其装船。 第3条", "氧气分析和气体探测设备 1", "运输易释放有毒或易燃气体或导致货物处所缺氧的固体散装货物时，须配备测量空气", "中气体或氧气浓度的适当仪器及其详细使用说明。该仪器须令主管机关满意。 2", "主管机关须采取措施，确保船员接受使用此类仪器的培训。", "第4条", "船上使用杀虫剂 * 在船上使用杀虫剂时须采取适当的预防措施，尤其是用于熏蒸的杀虫剂。 第5条", "积载和系固 1", "在甲板和舱内装运货物、货物组件 †和货物运输组件 ‡，其装载、积载和系固须尽可能", "防止在整个航程中对船舶和船上人员造成损害和危险，并防止货物落水灭失。 2", "货物、货物组件和货物运输组件，其在组件中的包装和系固，须能防止在整个航程中", "对船舶和船上人员造成损害或危险。 3", "在装载和运输重型货物或异常外形尺寸货物时，须采取适当的预防措施，确保船舶不", "发生结构损坏，并在整个航程中保持足够的稳性。 4", "在滚装船上装载和运输货物组件或货物运输组件时，须采取适当的预防措施，特别是", "此类船上、货物组件和货物运输组件的系固装置，以及系固点和绑扎索具的强度。 5", "货运集装箱的装载不得超过经修正的《国际集装箱安全公约》（《集装箱公约》）规定", "的安全合格牌照上注明的最大总重。 6", "除固体和液体散装货物、货物组件和货物运输组件外的所有货物，须在整个航程中按", "照主管机关批准的《货物系固手册》进行装载、积载和系固。对于第 II-2/3.41 条定义的滚装处", "参见： .1《经修订的船上安全使用杀虫剂建议书》（第 MSC/Circ.1358 号通函）； .2《适用于货舱熏蒸的船上安全使用杀虫剂建议书》(经第 MSC.1/Circ.1396 号通函修正的第 MSC.1/Circ.1264 号通函)；和 .3《经修订的适用于货物运输组件的船上安全使用杀虫剂建议书》（第 MSC.1/Circ.1361/Rev.1 号通函）。", "参见《货物积载和系固安全操作规则》（经修正的第 A.714(17)号大会决议）。", "参见《国际海运危险货物规则》（《国际危规》）（经修正的第 MSC.122(75)号决议）。", "所船舶，须在离开泊位前根据《货物系固手册》完成对此类货物、货物组件和货物运输组件的 系固。《货物系固手册》的编制标准至少须等同于本组织制定的相关导则 *。", "B 部分", "固体散装货物的特别规定 第6条", "装载的可接受性 1", "在固体散装货物装船前，船长须得到有关船舶稳性和标准装载条件下货物分布的综合", "信息。提供此种信息的方法须使主管机关满意。 † 第7条", "散装固体货物的装载、卸载和积载 ‡ 1", "就本条而言，码头代表系指船舶装卸货物的码头或其他设施指定的人员，负责该码头", "或设施对特定船舶进行作业。 2", "为使船长能够防止船体结构产生过大应力，须向船舶配备一本手册，该手册须以船上", "负责货物作业的高级船员熟悉的语言编写。如该语言不是英文，则船上还须配备一本同样用英 语编写的手册。手册至少须包括： .1", "第 II-1/5-1 条所要求的稳性资料；", ".2", "压载和排放压载水的速率和容积；", ".3", "内底板上单位表面积的最大允许负荷；", ".4", "每舱的最大允许载荷；", ".5", "有关船体结构强度的一般装卸须知，包括在装卸货物、压载作业及航行期间的最 不利作业条件下的任何限制；", ".6", "如适用，任何特别的限制，例如主管机关或由其认可组织所规定的最不利作业条 件下的限制；及", ".7 3", "在船舶装卸和航行期间作用在船体的最大允许剪力和弯矩。", "固体散装货物在装卸之前，船长和码头代表须商定一项计划 ‡，该计划须确保在装卸过", "程中不超过船舶所允许的剪力和弯矩，同时还须包括装卸货物的顺序、数量和速度，同时考虑 到装卸货物的速度、船上灌注口的数量及减压载或加压载的能力。该计划及其任何后续修订须 提交给港口国有关当局。", "参见《经修订的货物系固手册编制导则》 （第 MSC/Circ.1353 /Rev.2 号通函）。", "参见《安全公约》第 II-1/5-1 条关于提供给船长的稳性信息。", "参见《散货船安全装卸操作规则》（BLU 规则）（经修正的第 A.862(20)号大会决议）。", "4", "船长和码头代表须确保装卸作业按照商定的计划进行。", "5", "如果在装卸过程中，船舶超过了第 2 款所述的任何限制，或者如果在继续装卸的情况", "下很可能超过这些限制，则船长有权暂停作业，并有义务相应地通知批准该计划的港口国有关 当局。船长和码头代表须确保采取纠正措施。卸货时，船长和码头代表须确保卸货方式不会损 坏船体结构。 6", "船长须确保船上人员持续监控货物作业。如有可能，在装卸过程中须定期检查船舶吃", "水，以确认所提供的吨位数据。每次测得的吃水和吨位数字均须记录在货物航海日志中。如发 现与商定的计划存在重大偏差，则须调整货物或压载作业或两者，以确保偏差得到纠正。", "第 VII 章 危险货物装运 * A-1 部分", "固体散装危险货物的装运 第7条", "定义 固体散装危险货物系指《国际危规》中所述的除液体或气体以外的由微粒、颗粒或较 大块状物质组成的任何物质，其成分大体均匀，并直接装入船舶货物处所而不用中间包装，包 括装入载驳船上的驳船内的此类物质。 第 7-1 条", "适用范围 † 1", "除另有明文规定外，本部分适用于载运固体散装危险货物的本规章适用的所有船舶和", "小于 500 总吨的货船。 2", "除非符合本部分的规定，禁止装运固体散装危险货物。", "3", "作为本部分规定的补充，各缔约国政府须颁布或促使颁布涉及固体散装危险货物事故", "的应急反应和医疗急救细则，同时考虑到本组织制定的指南 ‡。", "参见《船舶报告制度和船舶报告要求的一般原则，包括涉及危险货物、有害物质和/或海洋污染物事故报告导则》 （经修正的第 A.851(20)号大会决议） 。 † 参见《安全公约》第 II-2/19 条，其中包含对载运危险货物船舶的特殊要求。 ‡ 参见《国际危规》补编中转载的《危险货物事故急救指南（MFAG）》 。", "第 7-2 条", "单证 1", "在与海运固体散装危险货物运输有关的所有单证中，须使用散装货物运输名称（不得", "仅使用商品名称）。 2", "每艘载运固体散装危险货物的船舶须持有一份列明船上危险货物及其位置的特殊清单", "或舱单。可使用详细的积载计划来代替此类特殊清单或舱单，该计划按类别标识并列出船上所 有危险货物的位置。船舶在驶离前，须向港口国主管机关指定的人员或组织递交一份这些单证 的副本。 第 7-3 条", "积载和隔离要求 1", "固体散装危险货物须根据其性质安全地妥善装载和积载。不相容的货物须相互隔离。", "2", "不得载运易自热或可燃的固体散装危险货物，除非已采取足够的预防措施将发生火灾", "的可能性降至最低。 3", "散发危险蒸气的固体散装危险货物须积载在通风良好的货物处所内。", "第 7-4 条", "涉及危险货物事故的报告 1", "当发生涉及固体散装危险货物从船上落水灭失或可能灭失事故时，船长或该船舶的其", "他责任人须立即将此类事故的详细情况尽可能全面地向最近的沿岸国报告。该报告须根据本组 织制定的一般原则和指南 *起草。 2", "如本条第 1 款所述的船舶弃船时，或此类船舶的报告不完整或无法获得时，则按照第", "IX/1.2 条所界定的公司须尽最大可能承担本条对船长规定的义务。 第 7-5 条", "固体散装危险货物的载运要求 固体散装危险货物的载运须符合第 VI/1-1.1 条定义的《国际散固规则》的相关规定。"]}, {"title": "1.7 定义", "articles": ["就本规则而言，除另有规定外，下列定义须适用：", "静止角系指非黏性（即自由流动）颗粒状物质的最大斜坡角。它是该物质的锥体斜面 与水平面的夹角。", "参见《船舶报告制度和船舶报告要求的一般原则，包括涉及危险货物、有害物质和/或海洋污染物事故报告导则》 （经修正的第 A.851(20)号大会决议） 。", "散装货物运输名称（BCSN）用于识别海上运输中的散装货物。当货物列入本规则时， 该货物的“散装货物运输名称”在各明细表或索引中以大写字母标识。当货物为《国 际危规》中定义的危险货物时，如《安全公约》第 VII/1.1 条所定义，请参见 4.1.1。", "散装密度系指单位体积内固体、空气和水的重量。散装密度一般以千克每立方米（kg/m3） 计。货物中的空隙可能充满空气和水。", "货物处所系指船舶上指定用于装载货物的任何处所。 易流态化货物系指含有一定比例的细小颗粒和一定量水分的货物。如果运输时水分含 量超过其适运水分极限，则可能会流态化。", "黏性物质系指除非黏性物质以外的物质。 主管当局系指为与本规则有关的任何目的而指定或以其他方式认可的任何国家监管机 构或当局。主管当局须独立于托运人运作。", "精矿系指从天然矿石中通过物理或化学分离和去除不需要的成分的浓缩或选矿工艺而 获得的物质。", "交运货物系指托运人委托运输的固体散装货物。 动态分离系指在固体物质上方形成液浆（水和细小固体）的现象，从而产生自由表面 效应，可能会严重影响船舶的稳性。", "流动水分点系指物质的代表性试样在规定的试验过程中（见附录 2 第 1 节）出现流态 时水分含量的百分比（按湿时质量计）。", "流态系指大量颗粒状物质被液体饱和到一定程度时，由于震动、撞击或船舶摇摆等外 力作用下，失去其内部抗剪强度而呈现为液体的状态。 GHS 系 指 《 全 球 化 学 品 统 一 分 类 和 标 签 制 度 》 第 九 修 订 版 ， 由 联 合 国 作 为 第 ST/SG/AC.10/30/Rev.9 号文件出版。 A 组包括因湿度而具有危险性的货物，如果运输时湿度超过适运湿度限制，则可能导 致液化或动态分离。", "B 组包括具有化学危险性、可能导致船舶出现危险情况的货物。 C 组包括既不属于 A 组也不属于 B 组的货物。", "高密度固体散装货物系指积载系数等于或小于 0.56m3/t 的固体散装货物。 《国际危规》系指本组织海上安全委员会以第 MSC.122(75)号决议通过、并可由本组 织进行修正的《国际海运危险货物规则》。", "不相容物质系指混合时可能发生危险反应的物质。这些物质需满足第 9.3 节的隔离要 求和 B 组个别货物的明细表。", "《国际船舶和港口设施保安规则》（《保安规则》）系指《1974 年国际海上人命安全 公约》缔约国政府会议 2002 年 12 月 12 日第 2 号决议通过的《国际船舶和港口设施 保安规则》， 由 A 部分（其规定为强制性）和 B 部分（其规定为建议性）组成，并 可由本组织修订。", "《试验和标准手册》系指联合国出版物《试验和标准手册》第七修订版 (ST/SG/AC.10/11/Rev.7 和修正案 1)。", "仅在散装时有危险的物质（MHB）系指散装运输时可能具有化学危险的物质，但《国 际危规》中归类为危险货物的物质除外。", "水分含量系指代表性试样中由水、冰或其他液体组成的部分，以该试样总湿质量的百 分比表示。", "水分渗移系指由于震动和船舶摇摆导致货物沉淀和固结，从而使货物中所含水分发生 移动。水分逐渐渗出，可导致部分或全部货物出现流态。", "非黏性物质系指附录 3 第 1 段“干散货的特性”中所列的在运输过程中容易因滑动而 移动的干燥物质。", "潜在着火源系指但不限于明火、机械废气、厨房上风口、电源插座和电气设备，除非 它们是经过认证的安全类型。 *", "代表性试样系指用于测试货物的物理和化学性能以满足规定要求的足够数量的样品。 托运人系指其本人或以其名义或代表其与承运人签订海上货物运输合同的任何人；或 由其或以其名义或代表其就海上运输合同向承运人实际交付货物的任何人。", "固体散装货物系指除液体或气体以外的任何货物，由颗粒、粒状或任何较大的块状物 质组合而成，一般成分均匀，直接装入船舶货物处所，无任何中间围封形式。", "对于货物处所，参见《安全公约》第 II-2/19.3.2 条。", "热源系指表面温度可能超过 55℃的加热船舶结构。此类加热结构有蒸汽管路、加热线 圈、加热燃料舱和货舱的顶壁和侧壁以及机械处所的舱壁。", "积载系数系指表示一公吨货物所占立方米数的数字。 A 组货物的适运水分极限（TML）系指不符合第 7.3.2 节特别规定的船舶可安全运载的 货物的最大水分含量。其值由主管当局批准的试验程序确定，如附录 2 第 1 段规定的 试验程序。", "平舱系指在货物处所内对部分货物或全部货物进行平整。 通风系指货物处所外部与内部的空气交换。 .1", "持续通风系指始终不断进行的通风。", ".2", "机械通风系指通过动力进行的通风。", ".3", "自然通风系指不需要动力进行的通风。", ".4", "表面通风系指在货物表面进行通风。"]}, {"title": "2.1 货物的分布", "articles": ["**2.1.1** 概述 因固体散装货物装卸不当导致许多事故的发生。须注意的是，固体散装货物必须正确 分布在整个船舶上，以提供足够的稳性，并确保船舶结构不超负荷。此外，托运人须 按第 4 节的规定向船长提供有关货物的足够信息，以确保船舶的合理装载。 *", "**2.1.2** 防止结构超负荷 杂货船满舱满载时一般适于装载积载系数为 1.39 至 1.67m3/t 的货物。当装载高密度 固体散装货物时，须特别注意货物重量的分布，以避免应力过大，同时须考虑到装载 条件可能与通常情况不同，且此类货物的不当分布可能会引起负载部分甚至整个船体 结构的过度受压。由于每艘船舶的结构布置可能千差万别，因此为所有船舶制定精确 的荷载分布规则并不可行。货物适当分布的信息可在船舶稳性信息手册中提供，或可 使用配载仪（如有）获得。", "**2.1.3** 维护船舶稳性  2.1.3.1 考虑到《安全公约》第 II-1/5-1 条的规定，所有受公约约束的船舶均须配备稳性信心手 册。船长须能够计算出航行期间以及离港时预计最恶劣条件下稳性，并证明稳性是足 够的。 2.1.3.2 在甲板间货舱或仅部分装满的货舱中装载疑似容易移位的固体散装货物时，须设置足 够强度的防移板或防移箱。 2.1.3.3 在可行的情况下，高密度货物须优先装载在底舱处所而非甲板间货舱。 2.1.3.4 当需要在甲板间或较高货舱内载运高密度货物时，须适当考虑确保甲板区域不致过度 受力，且船舶稳性不会降至船舶稳性数据中规定的最低可接受水平以下。   另参见《散货船安全装卸操作规则》（经修正的第 A.862(20)号大会决议）。"]}, {"title": "2.2 装载和卸载", "articles": ["**2.2.1** 须检查货物处所并对装载的特定货物做好准备。 *", "**2.2.2** 作为必要的特别准备，须适当注意保持污水阱和滤板畅通，以防止货物进入舱底污水 排放系统。", "**2.2.3** 货物处所内的舱底污水管系、测深管系及其他服务管系须处于良好状态。", "**2.2.4** 考虑到某些高密度固体散装货物装载的速度较快，须特别注意保护货物处所设备不受 损坏。装载完成后对舱底进行探测可能有效地检测货物处所设备的损坏情况。", "**2.2.5** 在装载或卸载期间，须尽可能关闭或屏蔽通风系统，并将空调系统设置为再循环状态， 以尽量减少粉尘进入起居处所或其他舱室。", "**2.2.6** 须适当考虑尽量减少粉尘与甲板机械及室外助航设备的活动部件之间的接触。  参见《散货船船员和码头人员检查指南》（第 A.866(20)号大会决议）。"]}, {"title": "3.1 一般要求", "articles": ["**3.1.1** 在装载、载运和卸载固体散装货物之前和期间，须遵守所有必要的安全预防措施。", "**3.1.2** 对于在船舶结构内安装传送带系统的自卸式散货船，船员须对其货物作业区进行例行 的船上作业消防安全风险评估。须适当考虑在所有预期操作条件和货物情况下的防火 和探火系统的有效操作、控制和灭火。消防安全风险评估须在船舶安全管理体系（SMS） 中详细说明，并提供定期评估的建议时间。", "**3.1.3** 船舶须配备一份与散装固体危险货物事故有关的应急响应和医疗急救指南。 *"]}, {"title": "3.2 中毒、腐蚀和窒息危险", "articles": ["**3.2.1** 某些固体散装货物易于氧化，可能导致缺氧、释放有毒气体或烟雾及自热。某些货物 不易氧化，但可能散发有毒气体，尤其是在潮湿时。还有一些货物潮湿时会腐蚀皮肤、 眼睛、粘膜或船舶结构。载运此类货物时，须特别注意人员保护，并在装载前和卸载 后采取特别的预防措施。", "**3.2.2** 须适当注意货物处所和毗邻处所可能缺氧、或可能存在有毒或窒息性气体，且空置的 货物处所或封闭一段时间的液货舱可能氧气不足，无法维持生命。", "**3.2.3** 许多固体散装货物容易导致货物处所或液货舱内缺氧。这些货物包括但不限于大多数 植物产品和林产品、黑色金属、硫金属矿和货煤。", "**3.2.4** 在进入船上封闭处所之前，须遵守适当的程序，同时考虑本组织制定的建议。†需要注 意的是，在对货物处所或液舱进行测试并总体上认为可安全进入之后，仍可能存在缺 氧或存在有毒烟雾的小区域。", "**3.2.5** 当载运易于释放有毒或易燃气体和/或导致货物处所缺氧的固体散装货物时，须配备测 量货物处所内气体和氧气浓度的适当仪器。", "**3.2.6** 只有经过培训、佩戴自给式呼吸器和防护服的人员方可紧急进入货物处所，并始终在 负责人员的监督下进行。   参见《危险货物事故医疗急救指南》 （MFAG） （第 MSC/Circ.857 号通函）（见《国际危规》补遗）。   参见《经修订的关于进入船上封闭处所的建议》 （第 A.1050(27)号大会决议） 。"]}, {"title": "3.3 粉尘对健康的危害", "articles": ["为了最大限度地降低与接触某些固体散装货物粉尘有关的慢性和急性风险，接触粉尘 的人员必须保持高标准的个人卫生，这一点怎么强调都不为过。必要时须采取预防措 施，包括使用适当的呼吸保护装置、防护服、防护护肤霜、充分的个人清洗和清洗外 衣。"]}, {"title": "3.4 易燃环境", "articles": ["**3.4.1** 某些固体散装货物的粉尘可能会构成爆炸危险，特别是在装载、卸货和扫舱时。通过 通风以防止形成充满粉尘的环境以及用水管冲洗而不是清扫，可以将这种风险降至最 低。", "**3.4.2** 某些货物可能释放大量的可燃气体，足以构成火灾或爆炸危险。如果本《规则》的货 物明细表或托运人提供的货物信息表明了这一点，则货物处所须根据需要进行有效通 风。货物处所内的空气须通过适当的气体探测器进行监测。须适当考虑与货物处所毗 邻的封闭处所的通风和大气监测。"]}, {"title": "3.5 通风", "articles": ["**3.5.1** 除非另有明确规定外，当载运可能释放有毒气体的货物时，货物处所须有机械通风或 自然通风；当载运可能释放易燃气体的货物时，货物处所须有机械通风。", "**3.5.2** 如果保持通风会危及船舶或货物，则可中断通风，除非中断通风会产生爆炸危险。", "**3.5.3** 当某货物在本规则明细表或者托运人提供的货物信息中要求持续通风时，货物在船上 时须保持通风，除非出现通风危及船舶的情况。", "**3.5.4** 用于装载需要持续通风的货物的货物处所须装有通风口。此类开口须符合经修正的《载 重线公约》对于未配备关闭装置的开口的要求。", "**3.5.5** 通风须确保任何逸出的危险气体、蒸汽或粉尘不能以危险浓度进入居住处所或其他内 部空间。须适当考虑防止逸出的危险气体、蒸汽或粉尘进入封闭的工作区。须采取足 够的预防措施保护这些工作区域的人员。", "**3.5.6** 当货物可能自热时，不得采用表面通风以外的通风。在任何情况下都不得将空气导入 货堆中。"]}, {"title": "3.6 货物在运输中的熏蒸", "articles": ["**3.6.1** 须根据本组织制定的建议案进行熏蒸。 *", "**3.6.2** 当使用磷化氢气体等熏蒸剂进行运输途中熏蒸时，须充分考虑熏蒸剂的剧毒性，并考 虑到尽管采取了许多预防措施，熏蒸剂仍有可能进入起居处所。特别是在熏蒸中的货 物处所发生熏蒸剂泄漏的情况下，须牢记熏蒸剂有可能通过管道隧道、管道和任何类 型的管道进入机舱，包括甲板上或甲板下的布线管道，或可能连接到货物处所或机舱 隔间的除湿系统。须注意潜在的隐患区域，诸如舱底、货物管线系统和阀门等 †。在任 何情况下，都应仔细检查航行期间船上的通风程序，以确定是否有可能吸入熏蒸剂气 体，例如不正确的通风程序和设置、由于不正确的关闭装置或扇叶设置而造成的真空、 空调和起居处所的闭环通风。在熏蒸程序开始前，须核实通风扇叶和关闭装置是否设 置正确，从机舱通往管线隧道/龙骨管路和熏蒸期间一旦发生泄漏可能导致不安全进入 的其他空间的所有舱壁开口（例如门和人孔）的关闭和密封方法是否有效 ，已确认关 闭并张贴警告标志。 ‡", "**3.6.3** 气体浓度安全检查还须在整个航程中持续进行，至少每隔 8 小时进行一次，或根据熏 蒸主管的建议，在所有适当地点进行更频繁的检查，这些地点至少须包括：起居处所； 机舱；指定用于船舶导航的区域；经常出入的工作区域和储存场所，例如与货舱相邻 的艏楼顶舱，在运输过程中要接受熏蒸。 还须特别注意可能存在问题的区域，例如舱 底和货物管线系统。此类读数须记录在船舶航海日志中。  参见《适用于货舱熏蒸的船上安全使用杀虫剂的建议》 （经第 MSC.1/Circ.1396 号通函修正的第 MSC.1/Circ.1264 号通函） 。    参见经第 MSC.1/Circ.1396 号通函修正的第 MSC.1/Circ.1264 号通函第 3.3.2.4 段。   参见经第 MSC.1/Circ.1396 号通函修正的第 MSC.1/Circ.1264 号通函第 3.3.2.10 段。"]}, {"title": "4.1 识别和分类", "articles": ["**4.1.1** 散装货物运输名称  4.1.1.1 本《规则》中的每种固体散装货物均已指定一个散装货物运输名称（BCSN）。当固体 散装货物经海上运输时，须在其运输单证上标明 BCSN。 4.1.1.2 如果货物属于危险货物且未用通用的正确运输名称标识，或在《国际危规》中没有另 有规定（N.O.S.）的条目，则 BCSN 须由正确运输名称和联合国编号组成。 4.1.1.3 除放射性物质、低比活度（LSA-I）、非裂变或例外裂变的 UN2912、放射性物质、表 面污染物体（SCO-I）、非裂变或例外裂变的 UN2913 和对环境有害、固体、未另列 明的 UN3077 (ENVIRONENTALLY HAZARDOUSSSTANCE, SOLID, N. O.S. UN 3077)外，如果货物是《国际危规》中用通用正确运输名称和/或未另列明的（N.O.S.） 的危险货物，则 BCSN 须按以下顺序排列组成： .1  物质的化学或技术名称；  .2  确定物质特性的具体描述；和  .3  联合国编号。", "**4.1.2** 如果运输的是废弃物货物，用于处置或加工处置，则货物名称前须标有 \"废弃物\"字样。", "**4.1.3** 正确识别固体散装货物有助于确定安全载运货物的必要条件和应急程序（如适用）。", "**4.1.4** 固体散装货物须酌情根据《联合国试验和标准手册》第 III 部分进行分类。本《规则》 所要求的固体散装货物的各种特性，在有原产国主管当局批准的试验程序的情况下， 须根据这种试验程序酌情确定。如无此类试验程序，则须根据本《规则》附录 2 规定 的试验程序，确定固体散装货物的有关特性。"]}, {"title": "4.2 信息提供", "articles": ["**4.2.1** 托运人须在装货前充分向船长或其代表提供有关货物的适当信息，以便能够采取必要 的措施对货物进行妥善积载和安全运输。", "**4.2.2** 货物信息须在货物装船前以书面形式通过运输单证予以确认。货物信息须包括： .1  散装货物运输名称(BCSN)，若货物列入本《规则》中。次要名称可用于散装货 物运输名称的补充；  .2  货物组别（A 和 B、A、B 或 C）；  .3  如适用，该货物的 IMO 分类；  .4  如适用，以字母“UN”开头的该货物的联合国编号；  .5  交运货物的总量；  .6  积载系数；  .7  散装密度（根据《安全公约》第 XII/10 条的要求）；  .8  必要时，平舱要求和平舱程序；  .9  移动的可能性，包括静止角（如适用）；  .10  以证书形式提供的附加信息，涉及货物的水分含量及 A 组货物的适运水分限值；  .11  形成湿基的可能性（见本《规则》第 7.2.3 小节）；  .12  货物可能产生的有毒或易燃气体（如适用）；  .13  货物的易燃性、毒性、腐蚀性和耗氧倾向（如适用）；  .14  货物的自热特性以及平舱要求（如适用）；  .15  遇水时释放易燃气体的特性（如适用）；  .16  放射性特性（如适用）；  .17  货物是否根据经修正的《经 1978 年议定书修订的<1973 年国际防止船舶造成污 染公约>》附则 V 附录 1 被归类为对海洋环境有害物质；以及  .18", "**4.2.3** 国家主管当局要求的任何其他信息。  托运人提供的信息须附有声明。货物申报表示例如下。货物申报表可使用另一种表格。 作为纸质文件的辅助手段，可使用电子数据处理（EDP）或电子数据交换（EDI）技术。     固体散装货物的货物信息表 散装货物运输名称（BCSN） 托运人  运输单证编号  收货人  承运人  名称/运输工具  说明或其它事项  出发港口/地点 目的港口/地点 货物的一般描述（材料类型/粒度）  总重（千克/吨）  散装货物规格（如适用）： 积载系数： 散装密度（根据《安全公约》第 XII/10 条 的要求）： 静止角（如适用）： 平舱程序： 潜在危险的化学特性* :  如类别和联合国编号或 MHB 危险  货物组别  适运水分限值  □ A和B组  适用于 A 组、B 组和 A 组货物  □ A组  装运时的水分含量  □ B组 □ C组 与《防污公约》附则 V 有关的分类 □ 对海洋环境有害 □ 对海洋环境无害 货物相关特殊性质 （例如可快速溶于水） 声明 本人特此声明：据我所知和所信，该批货 物的描述是完整准确的，并且所提供的试 验结果和其它规格均正确无误，可视为所 装载货物的代表。   适用于 A 组和 B 组以及 A 组货物 附加证书* □ 水分含量和适运水分限值证书 □ 风化证书 □ 豁免证书 □ 其它（请注明）  如需要  签字人姓名/身份，公司/组织名称 地点和日期 代表托运人签字"]}, {"title": "4.3 试验证书", "articles": ["**4.3.1** 为获得第 4.2.1 段所要求的信息，托运人须安排对货物进行适当取样和试验。如本《规 则》有要求，托运人须向船长或其代表提供适当的试验证书。", "**4.3.2** 承运 A 组货物时，托运人须向船长或其代表提供一份经签署的适运水分限值证书和一 份经签署的水分含量证书或声明，每份证书须由装货港主管当局认可的机构签发。该 适运水分限值证书须包括或附有测定适运水分限值的测试结果。水分含量声明须包括 或附有托运人的声明，表明就其所知和所信，水分含量是向船长提交声明时货物的平 均水分含量。", "**4.3.3** 承运 A 组货物时，托运人须根据本《规则》的规定制定取样、试验和控制水分含量的 程序，以确保货物在船上时含水量低于适运水分限值。此类程序须经装货港主管当局 批准并检查其实施情况。 * 主管当局签发的表明程序已获批的文件须提供给船长或其 代表。", "**4.3.4** 如果货物从驳船装载到船上，托运人在制定第 4.3.3 段规定的程序时，须包括保护驳 船上的货物免受降水和进水影响的程序。", "**4.3.5** 当船舶上多个货舱装载 A 组货物时，水分含量证书或声明须证明每个货舱装载的每 种细粒物料的水分含量。尽管有此要求，如果根据国际或国家认可的标准程序进行的 取样表明整个托运货物的水分含量是均匀的，则可接受所有货物处所的平均水分含量 的证书或声明。", "**4.3.6** 如果个别明细表要求对具有化学危险的货物进行认证，则该证书须包含或附有托运人 的声明，表明据其所知，货物的化学特性是装船时存在的化学特性。 然而，重要的是 要确保所采集的样本能够代表货堆的整个深度。"]}, {"title": "4.4 采样程序", "articles": ["**4.4.1** 除非在装货前对真正有代表性试样进行试验，否则对货物的任何物理性能测试毫无意 义。", "**4.4.2** 取样只能由接受过采样程序适当培训的人员进行，并在充分了解货物特性以及适用的 采样原则和实践的人员的监督下进行。", "**4.4.3** 对于 A 组货物，托运人须提供便利使船舶指定代理人进入货堆，对货物进行检查、取 样以及后续测试。", "**4.4.4** 在采样之前，在可行的范围内，须对将要装船的托运货物进行外观检查。任何看起来 受到污染或在特性或含水量方面与整批货物有显著差异的不同材料均须单独采样和分 析。根据这些测试所取得的结果，可能有必要将这些特定视为不适于装运而予以拒收。", "**4.4.5** 试样的采集所用技术须考虑到以下因素： .1  货物类型；   参见 《易流态化或易发生动态分离固体散装货物水分含量取样、测试和控制程序制定与认可导则》（第 MSC.1/Circ.1454/Rev.2 号通函） 。    .2  颗粒度分布；  .3  货物的组成成分及其差异；  .4  货物的储存方式，如堆积、装载铁路火车或其他容器内；货物的转运或装载方式， 如利用传送带、装货滑槽、抓斗起重机等；  .5  化学危险（毒性、腐蚀性等）；  .6  须测定的特性：水分含量、适运水分限值、堆积密度/积载系数、静止角等；  .7  由于天气条件、自然排水（如排水到较低的堆放层或容器中）或其他形式的湿度 迁移，整个托运货物的湿度分布可能会发生变化；及  .8  因货物冻结可能产生的变化。", "**4.4.6** 在整个采样过程中，须格外注意防止品质和特性发生变化。用于水分测试的样品须立 即放入合适的气密、不吸水的容器中，容器中须留有最小的自由空气空间，以尽量减 少水分含量的变化，并妥善做出标记。", "**4.4.7** 除非另有明确规定，本《规则》要求的试验采样须遵循国际或国家认可的标准程序。", "**4.4.8** 对于未经加工的原矿，只有在能够进入矿堆的整个深度，并能从矿堆的整个深度提取 样品时，才可对固定矿堆进行取样。"]}, {"title": "4.5 确定适运水分限值和水分含量的取样/试验与装货之间的间隔", "articles": ["**4.5.1** 托运人须负责确保在货物装船之日起六个月内进行试验，以确定固体散装货物的适运 水分限值。尽管有此规定，如果货物的成分或特性因任何原因发生变化，托运人须负 责确保在合理推定已发生此种变化后再次进行适运水分限值测定的试验。", "**4.5.2** 托运人须负责确保在尽可能接近装货开始日期时进行水分含量的采样和试验。采样/试 验与开始装货日期之间的间隔不得超过 7 天。如果货物在试验时间与装货完成日期之 间暴露在大量雨雪中，则托运人须负责确保货物的水分含量仍低于适运水分限值，并 在可行的情况下尽快向船长提供相关证据。", "**4.5.3** 冻结货物的试样须在游离水分完全解冻后测定其适运水分限值或水分含量。"]}, {"title": "4.6 精矿货堆的采样程序", "articles": ["**4.6.1** 对所有货物规定单一的采样方法是不实际的，因为货物的特性及其可用形式会影响采 样程序的选择。在缺乏国际或国家认可的标准采样程序的情况下，可采用以下精矿货 堆的采样程序来测定精矿的水分含量和适运水分限值。这些程序无意取代可达到同等 或更高水分含量和适运水分限值精度的采样程序，如使用自动采样。", "**4.6.2** 在可能的情况下，从平整的货堆中以合理均布的格点上采集子样本。", "**4.6.3** 根据待运精矿数量，绘制出堆放区平面图，并将其划分为若干区域，每个区域约有 125 吨、250 吨或 500 吨。该平面图将标明所需的子样本数量以及每个子样本的采集点。 采集的每个子样均取自指定区域表面以下约 50 厘米处。", "**4.6.4** 子样本的数量和样本大小由主管当局确定，或根据下列比例确定：  货重不超过 15000 吨：每装运 125 吨货物，取子样 200 克。 货重超过 15000 吨但不超过 60000 吨：每装运 250 吨货物，取子样 200 克。 货重超过 60000 吨：每装运 500 吨货物，取子样 200 克。", "**4.6.5** 用于测定水分含量的子样在提取后须立即放入密封容器（如塑料袋、罐或小金属桶）， 以便运往测试实验室，在那里进行充分混合，以获得完全具有代表性的样品。如果测 试地点没有测试设施，则在堆放场的受控条件下进行混合，然后将代表性样本放入密 封容器中，运往检测实验室。", "**4.6.6** 基本采样步骤包括："]}, {"title": "4.7 .1", "articles": ["确定拟采样的货物；", ".2", "按第 4.6.4 段确定所需子样和试样的数量；", ".3", "确定子样的采样点以及混合这些子样以取得代表性试样的方法；", ".4", "收集各子样并将其放入密封容器中；", ".5", "充分混合各子样以获得代表性试样；和", ".6", "如果须将试样运往试验室，则将其封装在密封容器中。", "已知的标准化采样程序示例 ISO 3082:2017", "铁原矿 – 取样和样品制备程序", "(注：根据此项标准，不允许对 船舶和货堆进行原位取样) IS 1405:2010", "铁原矿 – 取样和样品制备 – 手工方法", "(注：此项印度标准包含 3 米高 度以上货堆原位取样) ISO 1988:1975", "硬煤 – 采样", "ASTM D2234/D2234M – 17", "煤总样品采集的标准做法", "澳大利亚标准 AS 4264.1", "煤和焦炭-采样：第 1 部分：高品级煤 – 采样程序", "AS 1141", "系列 – 骨料采样和试验方法", "BS 1017-1:1989", "煤和焦炭采样方法。煤采样方法", "BS 1017-2:1994", "煤和焦炭采样方法。焦炭采样方法", "加拿大精矿矿堆标准采样程序 欧洲共同体化肥控制采样程序 JIS M 8100", "日本散装物料采样方法通则", "JIS M 8100:1992", "颗粒货物 – 采样方法通则", "波兰标准采样程序： 铁和锰矿 – 参考编号 PN-67/H-04000 有色金属 – 参考编号 PN-70/H-04900 俄罗斯联邦测定精矿水分含量的标准采样程序。"]}, {"title": "4.8 载运危险货物船舶要求配备的文件", "articles": ["**4.8.1** 根据《安全公约》第 VII/7-2.2 条的规定，每艘载运固体散装危险货物的船舶均须持有 一份特别清单或舱单，列明船上危险货物及其位置。可使用详细的积载图来代替此类 特别清单或舱单，该积载图按类别标明船上所有危险货物并列出其位置。", "**4.8.2** 船舶载运固体散装危险货物时，须随船配备危险货物事故应急反应的适当指南。", "**4.8.3** 1984 年 9 月 1 日或以后建造的 500 总吨及以上的货船以及 1992 年 2 月 1 日或以后 建造的 500 总吨以下的货船，根据《安全公约》第 II-2/19.4 条（或第 II-2/54.3 条）*， 在运输除第 6.2 和 7 类外的固体散装危险货物时，须持有《适装证书》。   参见《国际危规》第 1.1.1.2 条。"]}, {"title": "5.1 平舱的一般规定", "articles": ["**5.1.1** 对货物进行平舱可减少货物移动的可能性，并最大限度减少进入货物的空气。空气进 入货物可导致自热。为最大限度地减低这些风险，必要时须对货物进行合理平舱。", "**5.1.2** 货物处所须尽量满载，但不得导致底舱或“二层舱甲板”负荷过重，以防止固体散装 货物移动。在考虑货物移动、纵向移动以及船舶应力时，须适当考虑各货物处所内固 体散装货物的总重。货物须尽可能分散至货物处所的边界。可能还需要考虑到《安全 公约》第 XII 章所要求的备用货物处所装载限制。", "**5.1.3** 在考虑船舶特性和预定航程的前提下，当船长根据所掌握信息认为事关船舶稳性时， 有权要求货物平舱平整。"]}, {"title": "5.2 多层甲板船的特殊规定", "articles": ["**5.2.1** 当固体散装货物仅装入底舱处所，须对其进行充分平舱，以均衡舱底结构的货物重量 分布。", "**5.2.2** 当固体散装货物装载在“二层舱”时，如果装载信息载明敞开二层舱盖会使舱底结构 的应力超负荷，则须关闭“二层舱”盖。货物须予以合理平舱，并将货面平至两舷，或 用具有足够强度的纵向隔板进行固定。须注意二层甲板的安全承载能力，确保甲板结 构不超载。", "**5.2.3** 如果“二层舱”中装载货煤，每一、二层舱的舱口须严密封闭，以防止空气通过“二层 舱”的货体上升。"]}, {"title": "5.3 黏性散装货物的特殊规定", "articles": ["**5.3.1** 所有潮湿货物及某些干散货均具有黏性。黏性货物须适用第 5.1 小节中的一般规定。", "**5.3.2** 静止角不是黏性散装货物稳定性的指标，也不包括在黏性货物的单项明细表中。"]}, {"title": "5.4 非黏性散装货物的特殊规定", "articles": ["**5.4.1** 非粘性散装货物是指附录 3 第 1 段所列的货物以及附录中未列出的、具有非粘性物质 特性的任何其他物质。", "**5.4.2** 出于平舱为目的，固体散装货物可分为黏性和非黏性货物两类。静止角是非黏性散装 货物的一个特征，它表明物质的稳定性，并已包括在非黏性货物的单独明细表中。货 物的静止角须确定适用本节的规定。静止角的确定方法见第 6 节。", "**5.4.3** 静止角小于或等于 30º 的非黏性散装货物 这类货物会像谷物一样自由流动，须按适用于谷物积载的规定装运 *。在确定以下各项 时须考虑货物的散装密度：", "**5.4.4** .1  防移板和防移箱的尺寸和加固方法；和  .2  自由货面的稳定性影响。  静止角大于 30º 但小于或等于 35º 的非黏性散装货物 这类货物须按以下衡准平舱： .1  以货物表面最高点和最低点之间的垂直距离(Δh)测量的货面不平整度不得超过 B/10，其中 B 为船舶横梁(m)，Δh 的最大允许值为 1.5m；或  .2", "**5.4.5** 使用经主管当局批准的平舱设备进行装载。  静止角大于 35º 的非黏性散装货物 这些货物须按以下衡准平舱： .1  以货物表面最高点和最低点之间的垂直距离(Δh)测量的货面不平整度不得超过 B/10，其中 B 为船舶横梁(m)，Δh 的最大允许值为 2.0m；或  .2   使用经主管当局批准的平舱设备进行装载。  参见《安全公约》第 VI 章和《国际散装谷物安全运输规则》（第 MSC.23（59）号决议）。"]}, {"title": "6.1 概述", "articles": ["非黏性固体散装货物的静止角须按本《规则》第 4.1.4 条要求，采用有关主管当局批准 的方法进行测定。"]}, {"title": "6.2 推荐的测定方法", "articles": ["有多种方法可用于测定非黏性固体散装物质的静止角。推荐的测定方法如下：", "**6.2.1** 倾箱法 这种试验室测试方法适用于粒度大于 10mm 的非黏性粒状物质。附录 2 的第 2.1 小节 中详细说明了该方法采用的设备和程序。", "**6.2.2** 船上测定法 在没有倾箱测量仪时，附录 2 的第 2.2 小节中给出了测定近似静止角的替代程序。"]}, {"title": "7.1 引言", "articles": ["**7.1.1** 本节旨在提请船长和其他负责散装货物装载和运输的人员注意与货物流态化有关的风 险以及将风险降至最低的防范措施。此类货物在装载时可能呈干燥的颗粒状，但可能 含有相当的水分，在航行期间发生的压实和振动的刺激下变得流动或不稳定。", "**7.1.2** 船舶的运动可能会引起货物移位，足以使船舶倾覆。货物移位可分为两种类型，滑动 危险或流态影响。根据第 5 节进行平舱可防止滑动危险。", "**7.1.3** 某些 A 组货物也可能自热。"]}, {"title": "7.2 导致危险的条件", "articles": ["**7.2.1** A 组货物含有一定比例的小颗粒和一定量的水分。A 组货物在航行中可能会流态化， 即使货物是黏性其已平舱平整。流态化会导致货物移位。这种现象可描述如下：", "**7.2.2** .1  由于船舶运动等原因，货物被压实，颗粒之间的空隙体积减小；  .2  货物颗粒之间的空隙减少导致处所内的水压增加；及  .3  水压的增加减小了货物颗粒之间的摩擦力，导致货物的抗剪强度降低。  当货物由大颗粒或块状组成时，水通过颗粒间的空隙水压不增加时，货物不会出现易 流态化。", "**7.2.3** 当水分含量超过适运水分限值（TML）时，可能发生液态化引起的货物移位。有些货 物易于出现水分渗移，即使平均水分含量低于 TML，也可能会形成危险的湿基。尽管 货物表面可能呈干燥状，但可能会发生未检测到的流态化，导致货物移位。当货物很 浅且有较大倾斜角时，高水分含量的货物特别易于滑动。", "**7.2.4** 当形成黏性流体状态时，货物可能会随着滚动而流向船舶的一侧，但不会随着滚动而 完全返回到另一侧。 因此，船舶可能会逐渐达到危险的倾斜角并突然倾覆。"]}, {"title": "7.3 易流态化货物的规定", "articles": ["**7.3.1** 概述  7.3.1.1 只有当 A 组货物的实际水分含量低于其 TML 时，方可接受装载。尽管有此规定，水 分含量超过 TML 的货物，可按第 7.3.2 条的规定，用专门建造或安装的货船装运，以 限制货物移位。    7.3.1.2 尽管有本《规则》第 1.4 节的规定，本《规则》第 4.2.2.9、4.2.2.10、4.3.2 至 4.3.5、 4.5、4.6 和 8 节的要求不必适用于 A 组货物，只要该货物是装载在第 7.3.2 条规定的 以限制货物移位而专门建造或安装的船舶上运输， 或装载在第 7.3.3 条规定的为干粉 货物而专门建造的船舶上运输。 7.3.1.3 除罐装或类似包装的货物外，不得将含有液体的货物配装在同一货物处所的易流态化 固体散装货物的上部或与之相邻。 7.3.1.4 在航行期间须采取适当措施，以防止液体流入载有固体散装货物的货物处所。 7.3.1.5 船长须注意船舶在海上航行时用水冷却这类货物可能带来的危险。进水可能会使这类 货物的水分含量达到流动状态。必要时，须适当考虑以喷雾方式喷水。", "**7.3.2** 为限制货物位移而专门建造或装有专门设备的货船  7.3.2.1 为限制货物位移而专门建造的货船须设有永久性结构限界，其布置可将货物的位移限 制在允许的范围内。这类船舶须持有主管机关批准的证明。 7.3.2.2 为限制货物位移而安装有专门设备的货船须安装专门设计的可拆卸的隔板，以将货物 的位移限制在允许的范围内。装有专门设备的船舶须符合下列要求： .1  这种专门设备的设计和安装，须不仅能充分抵御高密度散装货物流动运动所产生 的巨大冲击力，而且还须满足将货物在舱内流动所产生的潜在横倾力矩降低到可 允许的安全水平的要求。为满足这些要求而提供的防移分隔物不得用木材制作。  .2  船舶结构中与此类货物相接的构件必要时须加固。  .3  设计所依据的专门设备的布置图和稳性条件细节须经主管机关批准。这种船舶须 持有经主管机关批准的证明。  7.3.2.3 向主管机关提交此类船舶的审批材料须包括： .1  包括纵、横剖面图在内的有关结构图；  .2  稳性计算，考虑装载设备和货物的可能移位，显示舱内货物和液体以及易流态化 货物的分布；和  .3", "**7.3.3** 有助于主管机关评估所提交材料的任何其他信息。  为干粉类货物而专门建造的货船  7.3.3.1 专门为干粉类货物建造的货船在设计和建造上须满足以下条件： .1  只运输干粉类货物，和  .2  利用气动设备的封闭系统装卸货物，防止货物暴露于风雨中。  7.3.3.2 此类船舶须持有主管机关批准的证明。"]}, {"title": "8.1 概述", "articles": ["对于 A 组货物，其实际水分含量和适运水分限值须按照本《规则》第 4.1.1 条所要求 的由有关当局确定的程序来测定。"]}, {"title": "8.2 测量水分含量的测定程序", "articles": ["国际和国内均有公认的方法测定各种物质的水分含量。参见附录 2 中的第 1.1.4.4 段。"]}, {"title": "8.3 测定适运水分限值的方法", "articles": ["测定适运水分限值的建议方法参见附录 2。"]}, {"title": "8.4 测定流态化可能性的补充测试程序", "articles": ["**8.4.1** 船长可在船上或码头边用以下辅助方法进行校核试验，以大致确定货物流态化的可能 性： 在圆柱形罐或类似容器（0.5 至 1 升容量）中装入一半的物质试样。一手握住圆 筒罐，从约 0.2 m 的高度将其猛力向下砸向坚硬的表面，如硬桌面。以 1 至 2 秒 为间隔，重复此过程 25 次。检查表面是否有游离水分或呈流动状态。如果出现 游离水分或流体状态，则应在装货前对物质进行额外的实验室试验。", "**8.4.2** 如果样品在罐装试验后仍然干燥，则该物质的水分含量仍可能超过适运水分限值 （TML）。"]}, {"title": "9.1 概述", "articles": ["由于其化学性质或特性，在运输中可能具有化学危险性的固体散装货物属于 B 组。此 类物质可分类如下： .1", "危险货物（见第 9.2.2 条），不具有第 9.2.3 条规定的其他化学危险性；", ".2", "仅在散装时有危险的物质（MHB）（见第 9.2.3 条） ；或", ".3", "危险货物还具有第 9.2.3 条规定的其他化学危险性。", "在装载之前，须获取有关散装运输货物的物理和化学特性的最新有效信息。"]}, {"title": "9.2 危险性分类", "articles": ["**9.2.1** 根据本《规则》的要求，对具有化学危险性并打算散装装运的货物的分类须符合第 9.2.2 和 9.2.3 条的规定。", "**9.2.2** 危险货物分类 《安全公约》第 VII/7 条定义了固体散装危险货物。就本《规则》而言，危险货物须按 《国际危规》第 2 部分进行分类。  9.2.2.1 第 4.1 类：易燃固体 此类物质系指易燃固体和经摩擦可能起火的固体。 9.2.2.2 第 4.2 类：易自燃物质 此类物质系指除引火物质以外，在其没有能量供应的情况下与空气接触时易于自热。 9.2.2.3 第 4.3 类：遇水释放易燃气体的物质 此类物质系指与水相互作用易于自燃或释放出一定危险数量易燃气体的固体。 9.2.2.4 第 5.1 类：氧化物质 此类物质系指其本身未必可燃，但与其他物质接触时，可通过产生氧气引起或促成其 他物质的燃烧的物质。 9.2.2.5 第 6.1 类：有毒物质 此类物质系指通过吞咽、吸入或与皮肤接触可导致死亡或严重伤害或损害人体健康的 物质。    9.2.2.6 第 7 类：放射性物质 此类物质系指活性浓度和总活度均超过《国际危规》第 2.7.7.2.1 至 2.7.7.2.6 条规定 数值的任何含有放射性核素的物质。 9.2.2.7 第 8 类：腐蚀性物质 本类物质系指在与生物组织接触时通过化学作用会造成严重损害或对其他货物或运输 工具造成重大损坏甚至破坏的物质。 9.2.2.8 第 9 类：杂类危险物质和物品 此类物质系指在运输中呈现出其他类别未涵盖的危险性的物质和物品。", "**9.2.3** 仅在散装时有危险的物质（MHB）", "**9.2.3.1** 概述  9.2.3.1.1 此类物质在散装运输时具有《国际危规》分类系统所涵盖的危险之外的化学危险性。 这些物质在散装运输时存在重大风险，需要采取特殊预防措施。 9.2.3.1.2 如果物质具有如下定义的一种或多种化学危险性（不包括《国际危规》分类系统所涵 盖的危险性） ，则该物质须被归类为 MHB。在规定测试方法时，须使用所运货物的代 表性样品进行测试。样品须在货堆表面以下 200 至 360mm、堆放长度间隔为 3m 处 采集。 9.2.3.1.3 通过与具有已知危险特性的类似货物类比或通过事故记录，此类物质也可以被归类 为此类物质也可被归类为仅在散装时有危险的物质（MHB） 。 9.2.3.1.4 尽管对化学危险性进行了严格定义，以便为 MHB 分类制定统一的方法，但如果人 类经验或其他因素表明需要考虑其他化学危险性，则须始终将这些因素考虑在内。如 果发现与 都 9.2.3.2 至 9.2.3.7 条中描述的化学危险性有偏差（其他危险性 (OH)）， 则须如实记录并说明理由。其他危害应列入单独明细表的 \"危险性\" 部分。 9.2.3.1.5 对于被归类为 MHB 的货物，须在每份明细表特性表的 \"MHB \"单元格中提供符号参 考。当物质具有一种或多种下述定义的化学危险性时，\"MHB \"单元格中须包括每种 危险性的符号参考。符号参考摘要见下表： 化学危险性  符号参考  易燃固体  CB  自热固体  SH  遇湿释放易燃气体的固体  WF  遇湿释放有毒气体的固体  WT  有毒固体  TX  腐蚀性固体  CR  其他危险性  OH", "**9.2.3.2** 易燃固体：MHB（CB）  9.2.3.2.1 此类物质在散装运输时易燃或易引燃，但不符合第 4.1 类的既定衡准（见第 9.2.2.1 条）。 9.2.3.2.2 按照《联合国试验和标准手册》第 III 部分第 33.2.4.3.1 条所述初步筛选测试方法进 行的一次或多次燃烧测试，如燃烧时间小于 2 分钟，则粉状、颗粒状或糊状物质须被 归类为 MHB 类。当金属或合金粉末可以被点燃且反应在 20 分钟或更短时间内扩散 到样品的整个长度时，则须被归类为 MHB。初步筛选的测试样品长度为 200mm 下 表概述了这一方法： 固体货物 粉末状金属 固体物质", "**9.2.3.3** 第 4.1 类危险性，包装类 III 燃烧时间，燃烧距离 超过 5 分钟但少于 10 分钟， 250mm ＜45 秒，100mm  MHB 燃烧时间，燃烧距离 ≤20 分钟，200mm ≤2 分钟，200mm  自热固体：MHB（SH）  9.2.3.3.1 此类物质在散装运输时自热，不符合第 4.2 类的既定衡准（见第 9.2.2.2 条） 。 9.2.3.3.2 在按照 《联合国测试和标准手册》 第 III 部分第 33.4.6 条所述测试方法进行的试验中， 如果使用 100 立方毫米的样品在 140℃和 100℃条件下，测试样品的温度上升超过 10℃，则该物质应该被归类为 MHB。以下流程图说明了测试程序。 9.2.3.3.3 此外，如在按照《联合国试验和标准手册》第 III 部分第 33.5.4.3.5 条所述测试方法 进行的任何部分试验中观察到此类物质温度较环境温度上升 10°C 或以上，则该物质 须被归类为 MHB。进行此项试验时，应在 48 小时内连续测量样品的温度。如果在 48 小时结束时温度仍在上升，则须根据测试方法延长试验时间。", "**9.2.3.4** 潮湿时释放易燃气体的固体：MHB（WF）  9.2.3.4.1 此类物质在散装运输时与水接触会释放易燃气体，但不符合第 4.3 类的既定衡准（见 第 9.2.2.3 条）。 9.2.3.4.2 在按照《联合国试验和标准手册》第 III 部分第 33.5 条规定的测试方法进行测试中， 如果易燃气体释放速率大于零，则该物质须被归类为 MHB 类。在进行此项测试时， 须在 48 小时内以一小时为间隔计算气体释放的速率。如在 48 小时结束时，释放速 率增加，则须根据测试方法相应延长测试时间。", "**9.2.3.5** 潮湿时释放有毒气体的固体：MHB (WT)  9.2.3.5.1 此类物质散装运输时与水接触会释放有毒气体。 9.2.3.5.2 在按照《联合国试验和标准手册》第 III 部分第 33.5 条规定的测试方法进行的测试 中，如有毒气体释放速率大于零，则该物质须被归类为 MHB。有毒气体释放量的测 量须与测试方法中规定的易燃气体释放量相同的测试程序。在进行此项测试时，须在 48 小时内以 1 小时为间隔计算气体释放的速率。如在 48 小时结束时，气体释放的 速率增加，则须根据测试方法相应延长测试时间。    物质  对于 100 立方毫米 样品根据 N4*测试 法在 140℃下进行 测试，该物质是否 出现危险的自热现 象？  适用第 4.2 类  是  否  对于 100 立方毫米 样品根据 N4 测试 法在 140℃下进行 测试，该物质是否 出现温度升高 10℃ 或更高？  对于 100 立方毫米 样品根据 N4 测试 法在 100℃下进行 测试，该物质是否 出现温度升高 10℃ 或更高？  是  否 不是第 4.2 类不是  是  MHB  否 不是第 4.2 类不是  参见《联合国试验和标准手册》第Ⅲ部分第 33.3.1.6 条  9.2.3.5.3 须在上述规定的测试时间内收集气体。如果气体未知并且没有可用的急性吸入毒性 数据，则须对该气体进行化学分析和毒性测试。如果气体已知，则须根据所有可用信 息评估吸入毒性，并使用测试作为断定其危害性的最后手段。在这方面，有毒气体是 指经 4 小时测试显示急性吸入毒性（LC50）等于或低于 20000ppmV 或者 20mg/L 的 气体（GHS 急性毒性气体/蒸气类别 4）", "**9.2.3.6** 有毒固体：MHB（TX）  9.2.3.6.1 此类物质在装载、卸载或散装运输时，如果吸入或与皮肤接触会对人体产生毒性危害， 且不符合第 6.1 类的既定衡准（见第 9.2.2.5 条）。 9.2.3.6.2 须根据《全球化学品统一分类和标签制度》（GHS）第 3 部分规定的衡准将物质归 类为 MHB： .1  货物产生的粉尘经 4 小时测试，急性吸入毒性（LC50）为 1-5mg/L （GHS 急 性毒性粉尘第 4 类）；  .2  货物产生的粉尘呈现吸入毒性等于或小于 1mg/升/4h（GHS 特定目标器官毒性 单独曝露吸入粉尘第 1 类）或低于 0.02mg/升/6h/d（GHS 特定目标器官毒性 反复剂量吸入粉尘第 1 类）；    .3  货物呈现急性皮肤接触毒性（LD50）为 1000-2000mg/kg（GHS 急性皮肤接触 第 4 类）；  .4  货物经过 90 天测试，呈现的皮肤接触毒性低于 1000mg（GHS 特定目标器官 毒性单曝露皮肤第 1 类）或低于 20mg/kg bw/d（GHS 特定目标器官毒性重复 剂量皮肤第 1 类）；  .5  货物呈现出致癌性（GHS 第 1A 和 1B 类）、致突变性（GHS 第 1A 和 1B 类） 或生殖毒性（GHS 第 1A 和 1B 类）。", "**9.2.3.7** 腐蚀性固体：MHB（CR）  9.2.3.7.1 此类物质对皮肤、眼睛或金属有腐蚀性，或者是呼吸致敏物，不符合第 8 类的既定衡 准（见第 9.2.2.7 条）。 9.2.3.7.2 须根据《全球化学品统一分类和标签制度》（GHS）第 3 部分规定的衡准将物质归 类为 MHB： .1  货物已知为呼吸致敏物质（GHS 呼吸致敏第 1 类）；  .2  货物出现皮肤刺激，红斑/焦痂或水肿平均值等于或高于 2.3（GHS 皮肤腐蚀/ 刺激第 2 类）；  .3  呈现出眼睛刺激性的货物，角膜混浊/虹膜炎平均值等于或高于 1，结膜发红/水 肿平均值等于或高于 2（GHS 严重眼睛损伤第 1 类或眼睛刺激第 2A 类）。  9.2.3.7.3 在 55°C 的试验温度下，当钢表面的腐蚀速率每年在 4mm 至 6.25mm 时，此类物质 须被归类为 MHB。为了测试钢材，须使用 S235JR+CR（1.0037 或 St 37-2）、 S275J2G3 CR（1.0144 或 St 44-3）、ISO 3574:199、统一编号系统（UNS）G10200 或 SAE 1020 型号。《联合国试验和标准手册》第 III 部分第 37 节规定了可接受的测 试。货物的代表性样品须在典型的装运条件下进行测试，包含质量的水分含量、堆积 密度、粒度分布和大气条件。对钢材表面局部锈蚀的评估须采用国家或国际标准。进 行测试时须考虑到本组织制定的指南。 **"]}, {"title": "9.3 积载与隔离要求", "articles": ["**9.3.1** 一般要求  9.3.1.1 由于 B 组货物和属于第 9.2.2 和 9.2.3 条所述类别的货物具有潜在危险，因而需要隔 离不相容的货物。隔离还须考虑任何已识别的副危险。 9.3.1.2 除类别之间的一般隔离外，还可能需要将特定货物与其他物隔离。在与易燃物隔离的 情况下，须理解为不包括包装材料、天花板或垫舱材料；在这种情况下，后者的数量 须控制在最低限度。  参见《精炼腐蚀性固体测试指南》(第 MSC.1/Circ.1600/Rev.1 号通函)。    9.3.1.3 为了隔离不相容物质，“货舱”和“舱室”系指由钢质舱壁或船壳板及钢质甲板围闭的货物 处所。此类处所的围闭须具有防火和防液性能。 9.3.1.4 当载运两种或两种以上不同的 B 组固体散装货物时，它们之间须按第 9.3.4 条的规定 进行隔离。 9.3.1.5 当同一货物处所载运不同隔离等级的固体散装货物时，须按适用于各等级中最严格的 隔离规定对所有货物进行隔离。 9.3.1.6 当载运 B 组固体散装货物和包装类危险货物时，其间的隔离须按第 9.3.3 条的规定进 行。 9.3.1.7 不相容的货物不得同时装卸。装完一种货物后须关闭各货物处所的舱盖，在开始装载 其他货物之前须清除甲板上的残渣。在卸货时，也须遵循同样步骤。 9.3.1.8 为避免污染，所有食品均须按下列要求积载： .1  与标明有毒的物质“隔开”；  .2  用完整的隔间或舱室与所有感染性物质“隔离”；  .3  与放射性物质“隔离”；及  .4  “远离”腐蚀性物质。  如适用，这些术语的定义见第 9.3.3 和 9.3.4 条。 9.3.1.9 可能释放出足以影响健康的有毒气体的物质，不得装载在有毒气体可能逸入起居处所 或与起居处所相连的通风系统的货物处所。 9.3.1.10 腐蚀性强度足以损害人体组织或船舶结构的物质，须采取充分的预防和保护措施后 方可装船。 9.3.1.11 卸完有毒或氧化性货物后，须在装运其他货物前对这些货物所用的处所的污染状况 进行检查。在装载其他货物前，须对受到污染的货物处所进行彻底清洗和检查。 9.3.1.12 卸货后须对船舶任何残余物进行仔细检查，以便在装运其他货物之前将残余物清除。 9.3.1.13 对于在紧急情况下须打开舱盖的货物，货舱的舱盖须保持畅通，以便随时能够打开。", "**9.3.2** 特殊要求", "**9.3.2.1** 第 4.1、4.2 和 4.3 类物质  9.3.2.1.1 这类物质须尽可能合理地保持凉爽和干燥，除非本《规则》另有明确规定，否则须“远 离”一切热源或火源积载。 9.3.2.1.2 电气设备和电缆须处于良好状态，并有防止短路和火花的适当保护措施。如要求舱壁 适用于隔离目的时，则穿过甲板和舱壁的电缆和导管处须作密封处理，以防止气体和 蒸气通过。", "**9.3.2.1.3** 易于释放蒸汽或与空气形成爆炸性混合物的气体的货物，须在有机械通风的处所积  载。", "**9.3.2.1.4** 须严格执行在危险区域禁止吸烟的规定，并须清晰标示“严禁吸烟”字样。", "**9.3.2.2** 第 5.1 类物质  9.3.2.2.1 此类物质须尽可能合理地保持凉爽和干燥，除非本规则另有明确规定，否则须“远 离”一切热源或火源积载。也须与其他可燃物质“隔离”积载。 9.3.2.2.2 在装载此类货物之前，须特别注意清理装载货物的货物处所。在合理可行的情况下， 须使用不可燃的系固和防护材料，干燥垫舱木的使用须控制到最少。", "**9.3.2.2.3** 须采取防护措施，防止氧化性物质渗入其他货物处所、舱底和可能含有可燃物质的  其他处所。", "**9.3.2.3** 第 7 类物质  9.3.2.3.1 用于载运低比活度放射性物质（LSA-I）和表面受到放射污染的物体（SCO-I）的货物 处所，不得用于装载其他货物，除非经过合格人员消除了放射性污染，使任何表面上 非固定污染平均每 300cm2 不超过下述水平： 4 Bq/cm2  β和γ放射源和低毒性的α放射源；天然铀；天然钍；铀-235 或  (10-4 μCi/cm2)  铀-238；钍-232；含有钍-228 和钍-230 的矿石、物理或化学 精矿；半衰期低于 10 天的放射性核素；以及  0.4 Bq/cm2  所有其他α放射源。  (10-5 μCi/cm2)", "**9.3.2.4** 第 8 类物质或具有类似性质的物质  9.3.2.4.1 这些物质须尽可能保持干燥。 9.3.2.4.2 在装载此类货物之前，须注意清洁装载货物的货物处所，特别是确保这些处所干燥。 9.3.2.4.3 须防止此类物质渗入其他货物处所、舱底、污水阱及舱壁护板间的缝隙。 9.3.2.4.4 须特别注意卸货后货物处所的清洁，因为这类货物的残留物可能对船体结构具有极 强的腐蚀性。须考虑用水管冲洗货物处所，然后仔细进行干燥处理。", "**9.3.3** 具有化学危险的散装物质与包装危险货物间的隔离  9.3.3.1 除非本节或明细表中另有明确规定，B 组固体散装货物与包装危险货物须按下表进行 隔离。 9.3.3.2 关于包装危险货物积载和隔离的附加要求须参照《国际危规》中的危险货物一览表。 包装危险货物 1.1  散装货物 （危险性类别）  类别/ 1.2  2.2  小类 1.5 1.3 1.4 2.1 2.3 3 4.1 4.2 4.3 5.1 5.2 6.1 6.2 7  8  9  易燃固体  4.1  4  3  2  2  2  2  X  1  X  1  2  X  3  2  1  X  易自燃物质  4.2  4  3  2  2  2  2  1  X  1  2  2  1  3  2  1  X  遇水释放易燃气体的物质  4.3  4  4  2  2  X  2  X  1  X  2  2  X  2  2  1  X  氧化性物质（氧化剂）  5.1  4  4  2  2  X  2  1  2  2  X  2  1  3  1  2  X  有毒物质  6.1  2  2  X  X  X  X  X  1  X  1  1  X  1  X  X  X  放射性物质  7  2  2  2  2  2  2  2  2  2  1  2  X  3  X  2  X  腐蚀性物质  8  4  2  2  1  X  1  1  1  1  2  2  X  3  2  X  X  杂类危险物质和物品  9  X  X  X  X  X  X  X  X  X  X  X  X  X  X  X  X  MHB  X  X  X  X  X  X  X  X  X  X  X  X  3  X  X  X  仅在散装时有危险的物质 （MHB）  数字表示下列隔离条件： 1  “远离”： 有效隔离，从而使互不相容物质在发生事故时不会发生 危险的相互作用， 但只要水平垂直投影距离不小于 3 米， 仍可在同一舱室或货舱内或舱面上积载。  2  “隔离”：  在舱内积载时，装于不同的货舱中。如果中间甲板可以防火和 防液体，垂直隔离，即在不同的舱室积载，可被接受为等效隔 离。  3  “由一个完整舱室或货舱隔离”： 垂向或水平隔离。如果甲板不耐火、不耐液，则只能用 一介于中间的整个舱室作纵向隔离。    4  “用一介于中间的整个舱室或货舱纵向隔离”： 仅垂向隔离不符合这一要求。  X  如有隔离要求，参见《国际危规》危险货物一览表或本《规则》的明细表。  图例 参考散装货物 不相容的包装货物 防火防液甲板 注：垂直线表示货舱间的横向水密舱壁。", "**9.3.4** 具有化学危险固体散装货物的隔离 除非本节或 B 组货物明细表中另有规定，具有化学危险的固体散装货物须按下表隔离： 固体散装物质 类别/ 4.1 小类  4.2  4.3  5.1  6.1  7  8  9  易燃固体  4.1  X  易自燃物质  4.2  2  X  遇水释放易燃气体的物质  4.3  3  3  X  氧化性物质  5.1  3  3  3  X  有毒物质  6.1  X  X  X  2  X  放射性物质  7  2  2  2  2  2  X  腐蚀性物质  8  2  2  2  2  X  2  X  杂类危险物质和物品  9  X  X  X  X  X  2  X  X  MHB  X  X  X  X  X  2  X  X  仅在散装时有危险的物质   MHB  X   数字表示下列隔离要求： 2  “隔离”： 在舱内积载时，装于不同的货舱中。只有中间甲板可 以防火和防液，才可接受垂向隔离，即在不同的舱室 内积载。  3  “由一个完整舱室或货舱隔离”： 垂直或水平隔离。如果甲板不耐火、不耐液，只 能用一个介于中间的整个舱室作纵向隔离。  X  如有隔离要求，参加本《规则》的明细表。  图例 参考的散装货物 不相容的散装货物 防火防液的甲板  注：垂直线表示货舱间的横向水密舱壁。"]}, {"title": "10.1 序言", "articles": ["**10.1.1** 废弃物的跨境转移对人类健康和环境构成威胁。", "**10.1.2** 废弃物须按照有关国际建议和公约进行运输，特别是涉及海上散装运输时，须遵守本 《规则》的规定。"]}, {"title": "10.2 定义", "articles": ["**10.2.1** 就本节而言，废弃物系指含有一种或多种成分或受其污染的固体散装货物，这些货物 须遵守本《规则》中适用于第 4.1、4.2、4.3、5.1、6.1、8 或 9 类物质的规定，且其 运输以倾倒、焚烧或其他处置为目的，无其它直接用途。", "**10.2.2** 废弃物的跨境转移系指将废弃物从一个国家的管辖区域运往或途经另一个国家的管辖 区域，或运往或途经不属于任何国家管辖的区域，但运输中至少涉及两个国家。"]}, {"title": "10.3 适用性", "articles": ["**10.3.1** 本节的规定适用于船舶散装废弃物运输，且须与本《规则》的所有其他规定一并考虑。", "**10.3.2** 含有放射性物质或受到放射性物质污染的固体货物须遵守适用于放射性物质运输的规 定，并不得视为本节所指的废弃物。"]}, {"title": "10.4 《巴塞尔公约》 *规定的跨境转移", "articles": ["只有在以下情况下才允许开始废弃物的跨境转移： .1", "由原产国主管当局或由生产者或出口者通过原产国主管当局的渠道向最终目的 地国主管当局发出通知；且", ".2", "原产国主管当局在收到最终目的地国的书面同意，说明废弃物将被安全焚烧或通 过其他处置方法处理后，授权进行转移。", "《控制危险废弃物跨境转移及其处置巴塞尔公约（1989）》。"]}, {"title": "10.5 文件", "articles": ["除了运输固体散装货物所需的文件外，所有废弃物的跨境转移均须携带自始发地至处 置地的废弃物转移文件。该文件须随时可供有关主管当局和所有参与废弃物运输业务 管理的人员检查。"]}, {"title": "10.6 废弃物的分类", "articles": ["**10.6.1** 仅含有一种成分的废弃物，如属于本《规则》中适用于第 4.1、4.2、4.3、5.1、6.1、 8 或 9 类货物的规定的货物，则须被视为属于该类货物。如果这种成分的浓度使废弃 物持续构成该种成分本身固有的危险，则须将其分类为适用于该成分的类别。", "**10.6.2** 含有两种或两种以上成分的废弃物，如果属于本《规则》适用于第 4.1、4.2、4.3、5.1、 6.1、8 或 9 类货物规定的货物，则须根据第 10.6.3 和 10.6.4 条所述的危险特性和性 质进行分类。", "**10.6.3** 根据危险特性和性质的分类须按以下步骤进行： .1  通过测量或计算确定物理特性、化学特性和生物特性，然后根据适用于成分的衡 准进行分类；或  .2", "**10.6.4** 若无法确定上述特性，则须根据构成主要危险的成分对废弃物进行分类。  在确定主要危险性时，须考虑以下衡准： .1  若一种或多种成分属于某一类别，而废弃物所呈现的危险是这些成分所固有的， 则该废弃物须归入危险物质；或  .2  若所含成分属于两个或多个危险类别，则废弃物的分类须考虑《国际危规》中规 定的适用于多种危险的货物的优先顺序。"]}, {"title": "10.7 废弃物的积载与装卸", "articles": ["废弃物的积载和装卸须符合本《规则》第 1 至 9 节的规定以及 B 组货物具体明细表中 适用于造成危险的成分的任何附加规定。"]}, {"title": "10.8 隔离", "articles": ["废弃物须酌情按第 9.3.3 和 9.3.4 条的规定进行隔离。"]}, {"title": "10.9 事故处理程序", "articles": ["如果在运输中废弃物对运输船舶或环境构成危险，船长须立即通知启运国和目的地国 的主管当局，并就应采取的行动听取建议。"]}, {"title": "第11节 保安规定（概述）", "articles": ["引言\n本节规定涉及海上运输散装货物的保安。应注意的是，某些作为散装货物运输的物质，\n由于其固有的性质或与其他物质混合装运时，可能会被用作实施非法行为的武器的成分或增强\n其效果。（还应牢记的是，用于载运散装货物的船舶也可能被用作运输未经许可的武器、燃烧\n装置或爆炸物的工具，无论所运货物的性质如何。）国家主管当局可适用额外的保安规定，在\n提供或运输散装货物时应加以考虑。除第 11.1.1 条外，本节的规定仍为建议性规定。"]}, {"title": "11.1 对公司、船舶和港口设施的一般规定", "articles": ["**11.1.1** 经修正的《1974 年安全公约》第 XI-2 章和《国际船舶和港口设施保安规则》（ISPS 规则）A 部分的相关规定须适用于从事散装货物装卸和运输的公司、船舶和港口设施， 并且经修正的《1974 年安全公约》第 XI-2 章的规定适用于这些公司、船舶和港口设 施，同时考虑到《ISPS 规则》B 部分给出的指导。", "**11.1.2** 应酌情适当考虑《劳工组织/国际海事组织港口保安操作规则》和《国际危规》中与保 安相关的规定。", "**11.1.3** 任何从事散装货物装卸和运输的岸基公司人员、船上人员和港口设施人员，除了掌握 《ISPS 规则》中规定的安全要求外，还应掌握对此类货物的任何保安要求，并与其职 责相称。", "**11.1.4** 对从事散装货物装卸和运输的公司保安员、具有专门的保安职责的岸基公司人员、港 口设施保安员和具有特定职责的港口设施人员的培训还应包括与这些货物特性相关的 保安知识，例如这些货物为仅在散装运输时具有危险性的物质。", "**11.1.5** 第 11.1.4 条中未提及的所有从事散装货物运输的船上人员和港口设施人员均应熟悉与 该货物相关的、与其职责相称的保安计划的规定。"]}, {"title": "11.2 对岸基人员的一般规定", "articles": ["**11.2.1** 就本小节而言，岸基人员包括以下人员： -  制作散装货物运输单证；  -  提供散装货物运输；  -  接收散装货物运输；  -  装卸散装货物；    -  制定散装货物装载/积载计划；  -  装载/卸载船舶载运的散装货物的；和  -  实施、检验或检查适用规则和规定的遵守情况；或  -  主管当局确定的其他涉及散装货物的装卸和运输。  但是，第 11.2 小节的规定不适用于： -  《ISPS 规则》A 部分第 13.1 节中提及的公司保安员和适当的岸基人员；  -  《ISPS 规则》A 部分第 13.2 和 13.3 节提及的船舶保安员和船上人员；和  -  《ISPS 规则》A 部分第 18.1 和 18.2 节提及的港口设施保安员、适当的港口设 施保安人员和具有专门的保安任务的港口设施人员。  对这些保安员和人员的培训，参见《ISPS 规则》。", "**11.2.2** 从事散装货物海上运输的岸基人员应考虑与其职责相适应的散装货物运输保安规定。", "**11.2.3** 保安培训  11.2.3.1 岸基人员的培训还应包括保安意识、控制接近货物和船舶的要求以及对具有保安意 义的散装货物类型的一般指导。 11.2.3.2 保安意识培训应包括保安风险的性质、识别保安风险、应对和降低风险的方法以及发 生保安漏洞时应采取的行动。培训应包括熟悉与其职责相应的保安计划（如适用，参 见第 11.3 节）及其实施保安计划中的作用。 11.2.3.3 此类培训应在受雇于涉及散装货物海上运输的岗位时提供或核实，并应定期提供再 培训。 11.2.3.4 雇主应保存所有保安培训的记录，并在雇员要求时提供给雇员。"]}, {"title": "11.3 对后果严重固体散装货物的规定", "articles": ["**11.3.1** 就本小节而言，具有潜在保安影响的高后果固体散装货物系指有可能被滥用于非法行 为，并可能造成大规模伤亡或大规模破坏等严重后果的散装货物，例如，第 5.1 类硝 酸铵 UN1942 和硝酸铵化肥 UN2067。", "**11.3.2** 本小节规定不适用于船舶和港口设施（有关船舶保安计划和港口设施保安计划见 《ISPS 规则》）。", "**11.3.3** 从事具有高度潜在保安影响的固体散装货物运输的发货人和其他人员应采用、实施并 遵守至少包含第 11.3.4 条中所述内容的保安计划。", "**11.3.4** 保安计划应至少包括下列内容： .1  将保安责任具体分配给有能力的合格人员，并赋予其履行责任的适当权力；    .2  所运输的具有较高保安潜在影响的散装货物或具有较高保安潜在影响的散装货 物种类的记录；  .3  酌情审查当前运营情况并评估薄弱环节，包括多式联运、临时中转储存、装卸和 分送；  .4  明确的措施说明，包括培训、政策（包括对较高威胁情况的应对措施、新员工/招 聘审查等） 、操作实践（例如已知的航线选择/使用、对进入船舶、散装货物储存 和装载区域的控制、与薄弱基础设施的接近等）、用于降低保安风险的设备和资 源；  .5  报告和处理保安威胁、违反保安或保安相关事件的有效和最新程序；  .6  保安计划评估和测试程序以及定期审查和更新计划的程序；  .7  确保保安计划中运输信息安全的措施；及  .8  确保尽可能限制运输信息传播的措施。"]}]}];
const STORAGE_NOTES = "liangyuan_notes_v1";
let notes = JSON.parse(localStorage.getItem(STORAGE_NOTES) || "{}");
let currentReg = 0;

function saveNotes() { localStorage.setItem(STORAGE_NOTES, JSON.stringify(notes)); }

function renderTabs() {
  const el = document.getElementById("tabs");
  el.innerHTML = DATA.map((r, i) => `
    <div class="tab ${i===currentReg?'active':''}" data-idx="${i}">
      <div class="tab-title"><span class="tab-badge">必读</span>${escapeHtml(r.title)}</div>
      <div class="tab-meta">${r.chapter_count} 章 ${r.article_count} 条 · 生效 ${r.effective}</div>
    </div>
  `).join("");
  el.querySelectorAll(".tab").forEach(t => {
    t.addEventListener("click", () => switchReg(parseInt(t.dataset.idx)));
  });
}

function switchReg(idx) {
  currentReg = idx;
  document.getElementById("search").value = "";
  renderTabs();
  renderTOC();
  renderContent();
  window.scrollTo({top: 0, behavior: "smooth"});
}

function renderTOC() {
  const r = DATA[currentReg];
  const el = document.getElementById("toc");
  el.innerHTML = `<h3>${escapeHtml(r.title)}</h3>` +
    r.chapters.map((c, i) => `
      <a class="toc-chapter" data-target="ch-${i}">${escapeHtml(c.title)}</a>
    `).join("");
  el.querySelectorAll(".toc-chapter").forEach(a => {
    a.addEventListener("click", () => {
      document.getElementById(a.dataset.target).scrollIntoView({behavior: "smooth"});
      el.querySelectorAll(".toc-chapter").forEach(x => x.classList.remove("active"));
      a.classList.add("active");
    });
  });
}

function renderContent() {
  const r = DATA[currentReg];
  const el = document.getElementById("content");
  let html = `
    <div class="reg-meta">
      <strong>${escapeHtml(r.title)}</strong><br>
      发布：${escapeHtml(r.issuer)} · 生效：${escapeHtml(r.effective)}<br>
      原文：<a href="${escapeHtml(r.source)}" target="_blank">${escapeHtml(r.source)}</a>
    </div>
  `;
  r.chapters.forEach((c, ci) => {
    html += `<div class="chapter-block" id="ch-${ci}">
      <div class="chapter-title">${escapeHtml(c.title)}</div>`;
    c.articles.forEach((art, ai) => {
      // 提取条号
      const m = art.match(/\*\*(第[一二三四五六七八九十百千]+条|\d+\.\d+(?:\.\d+)*)\*\*\s*([\s\S]*)/);
      const noteId = r.id + ".ch" + ci + ".a" + ai;
      const hasNote = notes[noteId] && notes[noteId].trim();
      if (m) {
        html += `<div class="article" data-id="${noteId}">
          <span class="article-num">${m[1]}</span>${escapeHtml(m[2]).replace(/\n/g,'<br>')}
          <button class="note-btn ${hasNote?'has-note':''}" data-note-id="${noteId}" title="${hasNote?'已有笔记':'添加笔记'}">${hasNote?'✎':'+'}</button>
          <div class="article-note" data-note-for="${noteId}">
            <textarea placeholder="记下你的理解或重点...">${escapeHtml(notes[noteId] || '')}</textarea>
          </div>
        </div>`;
      } else {
        // No 第X条 match — render as a continuation paragraph
        html += `<div class="article">${escapeHtml(art).replace(/\n/g,'<br>')}</div>`;
      }
    });
    html += `</div>`;
  });
  el.innerHTML = html;

  // Wire note buttons
  el.querySelectorAll(".note-btn").forEach(b => {
    b.addEventListener("click", e => {
      e.stopPropagation();
      const id = b.dataset.noteId;
      const noteDiv = el.querySelector(`[data-note-for="${id}"]`);
      noteDiv.classList.toggle("show");
      if (noteDiv.classList.contains("show")) {
        noteDiv.querySelector("textarea").focus();
      }
    });
  });
  el.querySelectorAll(".article-note textarea").forEach(ta => {
    const id = ta.parentElement.dataset.noteFor;
    ta.addEventListener("input", () => {
      notes[id] = ta.value;
      saveNotes();
      const btn = el.querySelector(`[data-note-id="${id}"]`);
      const hasNote = ta.value.trim();
      btn.classList.toggle("has-note", !!hasNote);
      btn.textContent = hasNote ? "✎" : "+";
    });
  });
}

function escapeHtml(s) {
  if (s == null) return "";
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"})[c]);
}

document.getElementById("search").addEventListener("input", e => {
  const q = e.target.value.trim();
  const content = document.getElementById("content");
  // Reset
  content.querySelectorAll("mark").forEach(m => {
    const p = m.parentNode;
    p.replaceChild(document.createTextNode(m.textContent), m);
    p.normalize();
  });
  if (!q) {
    content.querySelectorAll(".article").forEach(a => a.style.display = "");
    content.querySelectorAll(".chapter-block").forEach(c => c.style.display = "");
    return;
  }
  // highlight + filter
  const re = new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"), "gi");
  content.querySelectorAll(".article").forEach(a => {
    const txt = a.textContent;
    if (re.test(txt)) {
      a.style.display = "";
      // highlight in HTML, only in plain text nodes
      walk(a, re);
    } else {
      a.style.display = "none";
    }
  });
  content.querySelectorAll(".chapter-block").forEach(c => {
    const any = [...c.querySelectorAll(".article")].some(a => a.style.display !== "none");
    c.style.display = any ? "" : "none";
  });
});

function walk(node, re) {
  if (node.nodeType === 3) {
    if (re.test(node.nodeValue)) {
      const span = document.createElement("span");
      span.innerHTML = node.nodeValue.replace(re, m => `<mark>${m}</mark>`);
      node.parentNode.replaceChild(span, node);
    }
  } else if (node.nodeType === 1 && !["MARK","TEXTAREA","BUTTON"].includes(node.tagName)) {
    [...node.childNodes].forEach(n => walk(n, re));
  }
}

document.querySelectorAll(".size-btn").forEach(b => {
  b.addEventListener("click", () => {
    document.body.classList.remove("font-size-1","font-size-2","font-size-3");
    document.body.classList.add("font-size-" + b.dataset.size);
  });
});

renderTabs();
renderTOC();
renderContent();
</script>
