<script>
window.markmap = { autoLoader: { toolbar: true } };
// 动态适配 topbar 高度，防止 markmap 被遮挡
function fixContainerTop() {
  var tb = document.querySelector('.topbar');
  var mc = document.getElementById('mm-container');
  if (tb && mc) mc.style.top = tb.offsetHeight + 'px';
}
function makeMobileMapReadable() {
  if (!window.matchMedia('(max-width: 640px)').matches) return;
  var mc = document.getElementById('mm-container');
  var mm = document.querySelector('#mm-container .markmap');
  var svg = document.querySelector('#mm-container svg');
  var g = document.querySelector('#mm-container svg > g');
  if (!mc || !mm || !svg || !g || !g.getBBox) return;
  var box = g.getBBox();
  var width = Math.max(1500, Math.ceil(box.width * 0.55 + 80));
  var height = Math.max(1900, Math.ceil(box.height * 0.55 + 80));
  mm.style.width = width + 'px';
  mm.style.height = height + 'px';
  svg.setAttribute('width', width);
  svg.setAttribute('height', height);
  svg.style.width = width + 'px';
  svg.style.height = height + 'px';
  var nodes = Array.prototype.slice.call(document.querySelectorAll('.markmap-foreign'));
  if (nodes.length) {
    var mcRect = mc.getBoundingClientRect();
    var minLeft = nodes.reduce(function(min, node) {
      return Math.min(min, node.getBoundingClientRect().left - mcRect.left + mc.scrollLeft);
    }, Infinity);
    mc.scrollLeft = Math.max(0, Math.round(minLeft - 24));
  }
}
function fixMindmapLayout() {
  fixContainerTop();
  makeMobileMapReadable();
  fixMobileOutlineTop();
}
function fixMobileOutlineTop() {
  var tb = document.querySelector('.topbar');
  var outline = document.getElementById('mobile-outline');
  if (tb && outline) outline.style.marginTop = tb.offsetHeight + 'px';
}
function inlineMarkdown(text) {
  return text
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>')
    .replace(/\*\*([^*]+)\*\*/g, '<b>$1</b>');
}
function renderMobileOutline() {
  var outline = document.getElementById('mobile-outline');
  var tpl = document.querySelector('#mm-container script[type="text/template"]');
  if (!outline || !tpl || outline.dataset.ready) return;
  var html = '';
  tpl.textContent.split('\n').forEach(function(raw) {
    var line = raw.replace(/\s+$/, '');
    if (!line.trim()) return;
    if (line.indexOf('# ') === 0) return;
    if (line.indexOf('## ') === 0) {
      html += '<h2>' + inlineMarkdown(line.slice(3).trim()) + '</h2>';
      return;
    }
    if (line.indexOf('### ') === 0) {
      html += '<h3>' + inlineMarkdown(line.slice(4).trim()) + '</h3>';
      return;
    }
    var match = line.match(/^(\s*)-\s+(.*)$/);
    if (match) {
      var depth = Math.min(3, Math.floor(match[1].length / 2) + 1);
      html += '<div class="outline-item outline-depth-' + depth + '">' + inlineMarkdown(match[2].trim()) + '</div>';
    }
  });
  outline.innerHTML = html;
  outline.dataset.ready = '1';
}
function waitForMindmap() {
  renderMobileOutline();
  var tries = 0;
  var timer = setInterval(function() {
    tries += 1;
    fixMindmapLayout();
    if (tries > 40) clearInterval(timer);
  }, 150);
}
function loadMindmapWhenNeeded() {
  if (window.matchMedia('(max-width: 640px)').matches) {
    renderMobileOutline();
    fixMobileOutlineTop();
    return;
  }
  var script = document.createElement('script');
  script.src = 'https://cdn.jsdelivr.net/npm/markmap-autoloader@0.18';
  script.onload = waitForMindmap;
  document.body.appendChild(script);
}
window.addEventListener('load', loadMindmapWhenNeeded);
window.addEventListener('resize', fixMindmapLayout);
</script>
